<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memories Social 💖</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --accent: #d63384; --bg: #fff5f8; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        /* Header */
        header { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: white; position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Brush Script MT', cursive; font-size: 26px; color: var(--accent); font-weight: bold; }
        
        /* Inbox List */
        .inbox-item { padding: 15px; border-bottom: 1px solid #f9f9f9; display: flex; align-items: center; cursor: pointer; transition: 0.2s; }
        .inbox-item:hover { background: #fff0f5; }
        .avatar { width: 45px; height: 45px; background: #ffd1dc; border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* Chat Window */
        #chat-window { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 200; display: none; flex-direction: column; }
        .chat-header { padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; font-weight: bold; }
        .back-btn { cursor: pointer; font-size: 20px; color: var(--accent); }
        #msg-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #fffafa; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 75%; font-size: 14px; }
        .my-msg { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 2px; }
        .p-msg { align-self: flex-start; background: #eee; color: #333; border-bottom-left-radius: 2px; }

        /* General */
        .view { display: none; padding: 20px; }
        .active { display: block; }
        .btn-main { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }
        nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; padding: 12px 0; }
        .nav-icon { font-size: 22px; cursor: pointer; opacity: 0.4; }
        .nav-icon.active { opacity: 1; color: var(--accent); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="v-auth" class="view active" style="text-align:center; padding-top:100px;">
        <div class="logo" style="font-size:45px;">Memories</div>
        <input type="text" id="u-name" placeholder="Username" style="width:85%; padding:12px; margin:10px 0; border:1px solid #ffc1e3; border-radius:8px;">
        <input type="password" id="u-pass" placeholder="Password" style="width:85%; padding:12px; margin:10px 0; border:1px solid #ffc1e3; border-radius:8px;">
        <button class="btn-main" onclick="login()" style="width:90%;">Login / Register</button>
    </div>

    <div id="app-content" class="hidden">
        <header>
            <div class="logo">Memories</div>
            <div id="notif-dot" onclick="alert('Check Friend Requests in Search!')" style="cursor:pointer; position:relative;">❤️<span id="dot" style="position:absolute; top:-2px; right:-2px; background:red; width:8px; height:8px; border-radius:50%; display:none;"></span></div>
        </header>

        <div id="v-home" class="view active">
            <h3 style="margin-top:0;">Messages 💬</h3>
            <div id="inbox-list">
                </div>
        </div>

        <div id="chat-window">
            <div class="chat-header">
                <span class="back-btn" onclick="closeChat()">←</span>
                <span id="chat-with">Username</span>
            </div>
            <div id="msg-container"></div>
            <div style="padding:15px; display:flex; gap:10px; background:white; border-top:1px solid #eee;">
                <input type="text" id="m-text" placeholder="Message..." style="flex:1; padding:10px; border-radius:20px; border:1px solid #ddd; outline:none;">
                <button onclick="sendMsg()" style="background:none; border:none; color:var(--accent); font-weight:bold; cursor:pointer;">Send</button>
            </div>
        </div>

        <div id="v-search" class="view">
            <input type="text" id="s-query" placeholder="Find username..." style="width:70%; padding:10px; border:1px solid #ddd; border-radius:8px;">
            <button onclick="search()" style="padding:10px; background:var(--accent); color:white; border:none; border-radius:8px;">Search</button>
            <div id="s-result" style="margin-top:20px;"></div>
            <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
            <h4>Requests</h4>
            <div id="req-list"></div>
        </div>

        <nav>
            <div onclick="tab('home')" class="nav-icon active">🏠</div>
            <div onclick="tab('search')" class="nav-icon">🔍</div>
            <div onclick="tab('profile')" class="nav-icon">👤</div>
        </nav>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyA7fMm1LjMOz4BefGk60cmMuSoFzBvJapg",
        databaseURL: "https://ultimatememories-64a97-default-rtdb.firebaseio.com",
        projectId: "ultimatememories-64a97",
        authDomain: "ultimatememories-64a97.firebaseapp.com"
    };
    firebase.initializeApp(config);
    const auth = firebase.auth(), db = firebase.database();

    let myU = "", myId = "", activeRoom = "";

    async function login() {
        myU = document.getElementById('u-name').value.toLowerCase().trim();
        let p = document.getElementById('u-pass').value;
        if(!myU || p.length < 6) return alert("Enter valid details!");
        try {
            let res = await auth.signInWithEmailAndPassword(myU+"@m.com", p);
            start(res.user.uid);
        } catch(e) {
            auth.createUserWithEmailAndPassword(myU+"@m.com", p).then(res => {
                db.ref('users/'+myU).set(res.user.uid);
                start(res.user.uid);
            });
        }
    }

    function start(uid) {
        myId = uid;
        document.getElementById('v-auth').classList.add('hidden');
        document.getElementById('app-content').classList.remove('hidden');
        
        // Load Inbox
        db.ref('partners/'+myId).on('value', s => {
            let list = document.getElementById('inbox-list');
            list.innerHTML = "";
            if(!s.exists()) list.innerHTML = "<p style='color:grey; text-align:center;'>No messages yet. Search for a friend!</p>";
            s.forEach(p => {
                let data = p.val();
                list.innerHTML += `
                    <div class="inbox-item" onclick="openChat('${data.name}', '${data.sId}')">
                        <div class="avatar">👤</div>
                        <div>
                            <div style="font-weight:bold;">${data.name}</div>
                            <div style="font-size:12px; color:grey;">Click to chat</div>
                        </div>
                    </div>`;
            });
        });

        // Notifications
        db.ref('requests/'+myId).on('value', s => {
            document.getElementById('dot').style.display = s.exists() ? "block" : "none";
            let rl = document.getElementById('req-list'); rl.innerHTML = "";
            s.forEach(r => {
                rl.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span><b>${r.key}</b></span>
                    <button onclick="accept('${r.key}','${r.val()}')" style="background:var(--accent); color:white; border:none; border-radius:5px; padding:5px 10px;">Accept</button>
                </div>`;
            });
        });
    }

    function openChat(name, roomId) {
        activeRoom = roomId;
        document.getElementById('chat-with').innerText = name;
        document.getElementById('chat-window').style.display = 'flex';
        db.ref('chats/'+roomId).on('value', s => {
            let cont = document.getElementById('msg-container');
            cont.innerHTML = "";
            s.forEach(m => {
                let d = m.val();
                let cls = d.u === myU ? "my-msg" : "p-msg";
                cont.innerHTML += `<div class="msg ${cls}">${d.t}</div>`;
            });
            cont.scrollTop = cont.scrollHeight;
        });
    }

    function closeChat() {
        document.getElementById('chat-window').style.display = 'none';
        activeRoom = "";
    }

    function sendMsg() {
        let t = document.getElementById('m-text').value;
        if(t && activeRoom) {
            db.ref('chats/'+activeRoom).push({ u: myU, t: t });
            document.getElementById('m-text').value = "";
        }
    }

    function search() {
        let q = document.getElementById('s-query').value.toLowerCase().trim();
        if(q === myU) return alert("That's you!");
        db.ref('users/'+q).once('value', s => {
            if(s.exists()){
                document.getElementById('s-result').innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; background:#fff; padding:15px; border-radius:10px; border:1px solid #eee;">
                    <b>${q}</b>
                    <button onclick="sendReq('${q}','${s.val()}')" style="background:var(--accent); color:white; border:none; padding:8px 15px; border-radius:5px;">Add</button>
                </div>`;
            } else alert("User not found!");
        });
    }

    function sendReq(n, id) {
        db.ref('requests/'+id+'/'+myU).set(myId);
        alert("Request Sent!");
    }

    function accept(n, id) {
        let room = myId < id ? myId+id : id+myId;
        db.ref('partners/'+myId+'/'+n).set({ name: n, sId: room });
        db.ref('partners/'+id+'/'+myU).set({ name: myU, sId: room });
        db.ref('requests/'+myId+'/'+n).remove();
    }

    function tab(t) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
        document.getElementById('v-'+t).classList.add('active');
        event.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
