<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Memories 💖</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --main-color: #d63384; --bg-color: #fff5f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); margin: 0; padding: 20px; display: flex; align-items: center; justify-content: center; min-height: 100vh; cursor: crosshair; }
        .box { width: 95%; max-width: 400px; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 40px rgba(214,51,132,0.15); border: 1px solid #ffdae9; text-align: center; z-index: 10; }
        h1 { color: var(--main-color); margin-bottom: 20px; font-size: 24px; }
        .input-group { position: relative; width: 100%; margin: 12px 0; }
        input { width: 100%; padding: 15px; border: 1.5px solid #fbcfe8; border-radius: 12px; outline: none; box-sizing: border-box; background: #fff9fb; font-size: 16px; width: 100%; }
        .toggle-pass { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; z-index: 20; font-size: 18px; }
        .btn { background: var(--main-color); color: white; border: none; padding: 16px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .hidden { display: none !important; }

        /* Gallery */
        #gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-height: 350px; overflow-y: auto; padding: 10px; }
        .img-container { overflow: hidden; border-radius: 12px; height: 120px; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; }
        .img-card { width: 100%; height: 100%; object-fit: cover; }

        /* Zoom Modal & Delete inside it */
        #modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index: 10000; display:none; flex-direction: column; align-items:center; justify-content:center; }
        #modal img { max-width: 90%; max-height: 70%; border-radius: 10px; box-shadow: 0 0 20px white; }
        .modal-btns { margin-top: 20px; display: flex; gap: 20px; }
        .del-btn-big { background: #ff4757; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .close-btn { color: white; cursor: pointer; font-size: 14px; text-decoration: underline; }

        .heart { position: fixed; color: var(--main-color); font-size: 18px; pointer-events: none; animation: fly 1s linear forwards; z-index: 9999; }
        @keyframes fly { 0% { transform: translate(0, 0); opacity: 1; } 100% { transform: translate(var(--x), var(--y)); opacity: 0; } }
    </style>
</head>
<body>

    <div id="modal">
        <img id="zoomImg" src="">
        <div class="modal-btns">
            <button class="del-btn-big" id="deleteBtnAction">Delete Photo 🗑️</button>
            <p class="close-btn" onclick="closeZoom()">Close ✖</p>
        </div>
    </div>

    <div id="screen-auth" class="box animate__animated animate__zoomIn">
        <h1 id="auth-title">🔑 Login</h1>
        <div class="input-group">
            <input type="email" id="email" placeholder="Email">
        </div>
        <div class="input-group">
            <input type="password" id="pass" placeholder="Password">
            <span class="toggle-pass" onclick="togglePass()">👁️</span>
        </div>
        <button class="btn" onclick="handleAuth()">Enter Vault</button>
        <p onclick="toggleMode()" id="toggle-text" style="cursor:pointer; color:var(--main-color); margin-top:15px; font-size:14px; text-decoration:underline;">New User? Create Account</p>
    </div>

    <div id="screen-menu" class="box hidden animate__animated animate__fadeIn">
        <h1>Our Memories 💖</h1>
        <div style="background:#fff0f5; padding:15px; border-radius:20px; border:1px dashed var(--main-color);">
            <input type="file" id="filePicker" style="font-size:12px; margin-bottom:10px; width:100%;">
            <button class="btn" onclick="uploadImg()" id="up-btn">Upload Photo ✨</button>
        </div>
        <button class="btn" style="background:#6c757d" onclick="toggleGallery()" id="view-btn">See Photo 📸</button>
        <div id="gallery-wrapper" class="hidden">
            <div id="gallery"></div>
        </div>
        <button onclick="location.reload()" style="background:none; border:none; color:#aaa; margin-top:20px; cursor:pointer;">Logout</button>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA7fMm1LjMOz4BefGk60cmMuSoFzBvJapg",
        databaseURL: "https://ultimatememories-64a97-default-rtdb.firebaseio.com",
        projectId: "ultimatememories-64a97",
        appId: "1:513888704426:web:b1476d30698d45dd117dd3",
        authDomain: "ultimatememories-64a97.firebaseapp.com"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    let isLogin = true;

    function toggleMode() {
        const box = document.getElementById('screen-auth');
        box.classList.remove('animate__zoomIn');
        void box.offsetWidth;
        box.classList.add('animate__zoomIn');
        
        isLogin = !isLogin;
        document.getElementById('auth-title').innerText = isLogin ? "🔑 Login" : "📝 Register";
        document.getElementById('toggle-text').innerText = isLogin ? "New User? Create Account" : "Back to Login";
    }

    function togglePass() {
        const p = document.getElementById('pass');
        p.type = (p.type === "password") ? "text" : "password";
    }

    function handleAuth() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        if(isLogin) auth.signInWithEmailAndPassword(e, p).then(u => showDashboard(u.user.uid)).catch(err => alert(err.message));
        else auth.createUserWithEmailAndPassword(e, p).then(u => showDashboard(u.user.uid)).catch(err => alert(err.message));
    }

    function showDashboard(uid) {
        document.getElementById('screen-auth').classList.add('hidden');
        document.getElementById('screen-menu').classList.remove('hidden');
        window.currentUid = uid;
    }

    async function uploadImg() {
        const file = document.getElementById('filePicker').files[0];
        if(!file) return alert("Select photo!");
        document.getElementById('up-btn').innerText = "Uploading... ⏳";
        const fd = new FormData(); fd.append("image", file);
        const res = await fetch("https://api.imgbb.com/1/upload?key=cb53c38c41a5ce7d642d1152d306da9a", {method:"POST", body:fd});
        const data = await res.json();
        db.ref('pics/' + window.currentUid).push(data.data.url);
        document.getElementById('up-btn').innerText = "Upload Photo ✨";
        alert("Memory Saved! ❤️");
    }

    function toggleGallery() {
        const wrap = document.getElementById('gallery-wrapper');
        const btn = document.getElementById('view-btn');
        if(wrap.classList.contains('hidden')) {
            wrap.classList.remove('hidden'); btn.innerText = "Hide Photo 🙈";
            loadPhotos();
        } else {
            wrap.classList.add('hidden'); btn.innerText = "See Photo 📸";
        }
    }

    function loadPhotos() {
        const gal = document.getElementById('gallery');
        db.ref('pics/' + window.currentUid).on('value', snap => {
            gal.innerHTML = "";
            snap.forEach(child => {
                const div = document.createElement('div');
                div.className = "img-container animate__animated animate__fadeIn";
                div.innerHTML = `<img src="${child.val()}" class="img-card" onclick="openZoom('${child.val()}', '${child.key}')">`;
                gal.prepend(div);
            });
        });
    }

    function openZoom(src, key) {
        document.getElementById('zoomImg').src = src;
        document.getElementById('modal').style.display = "flex";
        document.getElementById('deleteBtnAction').onclick = function() {
            if(confirm("Delete this memory? 🥺")) {
                db.ref('pics/' + window.currentUid + '/' + key).remove();
                closeZoom();
            }
        };
    }

    function closeZoom() { document.getElementById('modal').style.display = "none"; }

    document.addEventListener('mousemove', (e) => {
        if(Math.random() > 0.8) {
            const h = document.createElement('div'); h.className = 'heart'; h.innerHTML = "❤️";
            h.style.left = e.clientX + 'px'; h.style.top = e.clientY + 'px';
            h.style.setProperty('--x', (Math.random() * 100 - 50) + 'px');
            h.style.setProperty('--y', (Math.random() * -100 - 50) + 'px');
            document.body.appendChild(h); setTimeout(() => h.remove(), 1000);
        }
    });
</script>
</body>
</html>
