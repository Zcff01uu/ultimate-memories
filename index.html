<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Memories Social 💖</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --accent: #d63384; --bg: #fff5f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; overflow: hidden; -webkit-user-select: none; }
        .container { width: 100%; max-width: 450px; background: white; height: 100vh; position: relative; margin: 0 auto; display: flex; flex-direction: column; }
        
        /* Auth */
        #auth-view { padding: 40px 20px; text-align: center; background: white; height: 100%; display: flex; flex-direction: column; justify-content: center; z-index: 5000; position: absolute; width: 100%; box-sizing: border-box; }
        .logo { font-family: 'Brush Script MT', cursive; font-size: 45px; color: var(--accent); margin-bottom: 20px; }
        .inp { width: 90%; padding: 12px; margin: 8px 0; border: 1px solid #ffc1e3; border-radius: 8px; outline: none; background: #fffcfd; }
        .btn { width: 96%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        header { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: white; }
        .app-title { font-family: 'Brush Script MT', cursive; font-size: 26px; color: var(--accent); }
        .view { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .hidden { display: none !important; }

        /* Feed Style */
        .post { background: white; border-bottom: 8px solid #f0f0f0; padding-bottom: 10px; }
        .post-header { display: flex; align-items: center; padding: 10px; gap: 10px; font-weight: bold; }
        .post-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #eee; }
        
        .item { padding: 15px; border-bottom: 1px solid #f9f9f9; display: flex; align-items: center; position: relative; cursor: pointer; }
        .avatar { width: 40px; height: 40px; background: #ffd1dc; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 18px; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .dot { width: 10px; height: 10px; background: #ff3b7b; border-radius: 50%; position: absolute; right: 25px; border: 2px solid white; display: none; }
        .has-new .dot { display: block; }
        .heart-dot { width: 10px; height: 10px; background: red; border-radius: 50%; position: absolute; top: -2px; right: -5px; border: 2px solid white; display: none; }

        nav { position: absolute; bottom: 0; width: 100%; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; padding: 12px 0; z-index: 100; }
        .nav-icon { font-size: 24px; color: #ccc; cursor: pointer; }
        .nav-icon.active { color: var(--accent); }
        
        #chat-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; display: none; flex-direction: column; }
        #msg-list { flex: 1; overflow-y: auto; padding: 15px; background: #fffafa; display: flex; flex-direction: column; gap: 8px; }
        .bubble { padding: 10px 15px; border-radius: 18px; max-width: 75%; font-size: 14px; word-wrap: break-word; }
        .sent { align-self: flex-end; background: var(--accent); color: white; }
        .recv { align-self: flex-start; background: #f0f0f0; }

        #hold-menu { position: fixed; bottom: -100%; left: 0; width: 100%; background: white; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); transition: 0.3s; z-index: 3000; padding: 20px 0; text-align: center; }
        #hold-menu.show { bottom: 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-view">
        <div class="logo">Memories</div>
        <input type="text" id="user-in" class="inp" placeholder="Username">
        <input type="password" id="pass-in" class="inp" placeholder="Password">
        <button class="btn" onclick="handleAuth()">Enter</button>
    </div>

    <div id="app-view" class="hidden" style="height: 100%; display: flex; flex-direction: column;">
        <header>
            <div class="app-title">Memories</div>
            <div style="position:relative; font-size:22px; cursor:pointer;" onclick="tab('notif')">❤️<div id="heart-dot" class="heart-dot"></div></div>
        </header>

        <div id="tab-home" class="view">
            <div id="feed-container"></div>
        </div>

        <div id="tab-msg" class="view hidden">
            <h4 style="margin:15px;">Inbox</h4>
            <div id="inbox"></div>
        </div>

        <div id="tab-search" class="view hidden">
            <div style="padding:15px; display:flex; gap:5px;"><input type="text" id="find-u" class="inp" style="margin:0; flex:1;" placeholder="Search..."><button class="btn" style="width:auto; margin:0;" onclick="search()">Go</button></div>
            <div id="search-results"></div>
        </div>

        <div id="tab-notif" class="view hidden"><h4 style="margin:15px;">Requests</h4><div id="req-list"></div></div>

        <div id="tab-profile" class="view hidden" style="text-align:center; padding-top:20px;">
            <div class="avatar" id="my-pic" style="width:80px; height:80px; margin:0 auto; border:2px solid var(--accent);">👤</div>
            <h3 id="my-name">User</h3>
            <div style="display:flex; justify-content:center; gap:10px; padding:10px;">
                <button class="btn" style="width:100px; background:white; color:var(--accent); border:1px solid var(--accent);" onclick="document.getElementById('p-in').click()">Add Pic</button>
                <button class="btn" style="width:100px;" onclick="document.getElementById('f-in').click()">Post</button>
            </div>
            <input type="file" id="p-in" hidden onchange="uploadFile(this, 'pics')">
            <input type="file" id="f-in" hidden onchange="uploadFile(this, 'feed')">
            <button class="btn" style="width:120px; background:#eee; color:red; margin-top:20px;" onclick="logout()">Logout</button>
        </div>

        <nav>
            <div onclick="tab('home')" id="nav-home" class="nav-icon active">🏠</div>
            <div onclick="tab('msg')" id="nav-msg" class="nav-icon">💬</div>
            <div onclick="tab('search')" id="nav-search" class="nav-icon">🔍</div>
            <div onclick="tab('profile')" id="nav-profile" class="nav-icon">👤</div>
        </nav>
    </div>

    <div id="chat-view">
        <div style="padding:15px; border-bottom:1px solid #eee; display:flex; align-items:center; gap:10px;"><span onclick="closeChat()" style="font-size:24px;">←</span><b id="chat-title">User</b></div>
        <div id="msg-list"></div>
        <div style="padding:10px; display:flex; gap:5px; border-top:1px solid #eee;"><input type="text" id="msg-input" placeholder="Aa" class="inp" style="margin:0; flex:1; border-radius:20px;"><button onclick="send()" style="border:none; background:none; color:var(--accent); font-weight:bold;">Send</button></div>
    </div>

    <div id="hold-menu" onclick="this.classList.remove('show')">
        <div class="menu-opt" onclick="confirmDelete()">Delete Chat</div>
        <div style="padding:15px; color:grey;">Cancel</div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyA7fMm1LjMOz4BefGk60cmMuSoFzBvJapg", databaseURL: "https://ultimatememories-64a97-default-rtdb.firebaseio.com", projectId: "ultimatememories-64a97", authDomain: "ultimatememories-64a97.firebaseapp.com" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let myU = "", myId = "", activeRid = "", selectedU = "", holdTimer, isOut = false;

    auth.onAuthStateChanged(user => {
        if(user && !isOut) {
            db.ref('users').orderByValue().equalTo(user.uid).once('value', s => {
                myU = Object.keys(s.val())[0]; myId = user.uid;
                document.getElementById('my-name').innerText = myU;
                document.getElementById('auth-view').classList.add('hidden');
                document.getElementById('app-view').classList.remove('hidden');
                initApp();
            });
        } else { document.getElementById('auth-view').classList.remove('hidden'); }
    });

    async function handleAuth() {
        isOut = false;
        let u = document.getElementById('user-in').value.toLowerCase().trim();
        let p = document.getElementById('pass-in').value;
        if(u && p.length >= 6) {
            try { await auth.signInWithEmailAndPassword(u+"@m.com", p); }
            catch(e) { let res = await auth.createUserWithEmailAndPassword(u+"@m.com", p); await db.ref('users/'+u).set(res.user.uid); }
        }
    }

    function uploadFile(input, type) {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const base64 = e.target.result;
            if(type === 'pics') db.ref('pics/' + myId).set(base64);
            else db.ref('feed').push({ u: myU, img: base64, time: Date.now() });
        };
        reader.readAsDataURL(file);
    }

    function initApp() {
        // Load Feed
        db.ref('feed').on('value', s => {
            const feed = document.getElementById('feed-container'); feed.innerHTML = "";
            let posts = []; s.forEach(p => { posts.unshift(p.val()); });
            posts.forEach(p => {
                feed.innerHTML += `<div class="post"><div class="post-header"><b>${p.u}</b></div><img src="${p.img}" class="post-img"></div>`;
            });
        });

        // Inbox
        db.ref('partners/' + myId).on('value', s => {
            const container = document.getElementById('inbox'); container.innerHTML = "";
            s.forEach(p => {
                const name = p.key, rid = p.val().sId;
                const div = document.createElement('div'); div.className = 'item'; div.id = 'chat-'+name;
                div.innerHTML = `<div class="avatar" id="av-${name}">👤</div><div style="margin-left:10px;"><b>${name}</b></div><div class="dot"></div>`;
                div.addEventListener('touchstart', () => { holdTimer = setTimeout(() => { selectedU = name; activeRid = rid; document.getElementById('hold-menu').classList.add('show'); }, 800); });
                div.addEventListener('touchend', () => clearTimeout(holdTimer));
                div.onclick = () => openChat(name, rid);
                container.appendChild(div);
                db.ref('chats/'+rid).limitToLast(1).on('child_added', snap => { if(snap.val().u !== myU && activeRid !== rid) div.classList.add('has-new'); });
            });
        });

        // My Pic
        db.ref('pics/' + myId).on('value', s => { if(s.exists()) document.getElementById('my-pic').innerHTML = `<img src="${s.val()}">`; });
        
        // Heart Dot
        db.ref('requests/' + myId).on('value', s => { 
            document.getElementById('heart-dot').style.display = s.exists() ? 'block' : 'none';
            const rl = document.getElementById('req-list'); rl.innerHTML = "";
            s.forEach(r => { rl.innerHTML += `<div class="item"><b>${r.key}</b> <button onclick="acceptReq('${r.key}','${r.val()}')" style="margin-left:auto; background:var(--accent); color:white; border:none; padding:5px 10px; border-radius:5px;">Accept</button></div>`; });
        });
    }

    function openChat(name, rid) {
        activeRid = rid; document.getElementById('chat-title').innerText = name;
        document.getElementById('chat-view').style.display = 'flex';
        document.getElementById('chat-'+name).classList.remove('has-new');
        db.ref('chats/'+rid).on('value', s => {
            const mBox = document.getElementById('msg-list'); mBox.innerHTML = "";
            s.forEach(m => { mBox.innerHTML += `<div class="bubble ${m.val().u === myU ? 'sent' : 'recv'}">${m.val().t}</div>`; });
            mBox.scrollTop = mBox.scrollHeight;
        });
    }

    function send() {
        let t = document.getElementById('msg-input').value.trim();
        if(t && activeRid) { db.ref('chats/'+activeRid).push({ u: myU, t: t }); document.getElementById('msg-input').value = ""; }
    }

    function confirmDelete() { db.ref(`partners/${myId}/${selectedU}`).remove(); db.ref(`chats/${activeRid}`).remove(); }
    function acceptReq(n, id) { let r = myId < id ? myId+id : id+myId; db.ref(`partners/${myId}/${n}`).set({ sId: r }); db.ref(`partners/${id}/${myU}`).set({ sId: r }); db.ref(`requests/${myId}/${n}`).remove(); tab('msg'); }
    function search() {
        let q = document.getElementById('find-u').value.toLowerCase().trim();
        db.ref('users/'+q).once('value', s => { if(s.exists() && q !== myU) document.getElementById('search-results').innerHTML = `<div class="item"><b>${q}</b><button onclick="sendReq('${q}','${s.val()}')" style="margin-left:auto;">Add</button></div>`; else alert("Not found"); });
    }
    function sendReq(n, id) { db.ref('requests/'+id+'/'+myU).set(myId); alert("Sent!"); }
    function logout() { isOut = true; auth.signOut(); }
    function closeChat() { activeRid = ""; document.getElementById('chat-view').style.display = 'none'; }
    function tab(t) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
        document.getElementById('tab-'+t).classList.remove('hidden');
        document.getElementById('nav-'+(t==='msg'?'msg':t)).classList.add('active');
    }
</script>
</body>
</html>
