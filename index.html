<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Memories 💖</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --main-color: #d63384; --bg-color: #fff5f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); margin: 0; padding: 20px; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .box { width: 90%; max-width: 380px; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 40px rgba(214, 51, 132, 0.1); border: 1px solid #ffdae9; text-align: center; position: relative; z-index: 10; }
        h1 { color: var(--main-color); margin-bottom: 20px; font-size: 24px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #fbcfe8; border-radius: 12px; outline: none; box-sizing: border-box; background: #fff9fb; font-size: 16px; }
        .btn { background: var(--main-color); color: white; border: none; padding: 15px; border-radius: 15px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; font-size: 16px; }
        .hidden { display: none; }
        #recaptcha-container { margin-top: 10px; }
        .heart-particle { position: fixed; pointer-events: none; color: var(--main-color); font-size: 20px; animation: fly 1s linear forwards; }
        @keyframes fly { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="screen-login" class="box animate__animated animate__fadeInDown">
        <h1>🔑 Login</h1>
        <input type="text" id="log-phone" placeholder="Mobile Number (with +91)">
        <input type="password" id="log-pass" placeholder="Password">
        <button class="btn" onclick="handleLogin()">Login</button>
        <p onclick="switchTo('register')" style="cursor:pointer; color:#d63384; font-size:14px; margin-top:15px;">New User? Create Account</p>
    </div>

    <div id="screen-register" class="box hidden animate__animated animate__fadeInDown">
        <h1>📝 Register</h1>
        <input type="text" id="reg-phone" placeholder="+91XXXXXXXXXX">
        <div id="recaptcha-container"></div>
        <button class="btn" id="send-otp-btn" onclick="sendOTP()">Send OTP</button>
        
        <div id="otp-section" class="hidden">
            <input type="text" id="otp-code" placeholder="Enter 6-digit OTP">
            <input type="password" id="reg-pass" placeholder="Create Secret Password">
            <button class="btn" onclick="verifyOTP()">Verify & Register</button>
        </div>
        <p onclick="switchTo('login')" style="cursor:pointer; color:#d63384; font-size:14px; margin-top:15px;">Back to Login</p>
    </div>

    <div id="screen-menu" class="box hidden">
        <h1>Welcome 💖</h1>
        <p>Aapka account verify ho gaya hai!</p>
        <button class="btn" onclick="location.reload()">Logout</button>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA7fMm1LjMOz4BefGk60cmMuSoFzBvJapg",
        databaseURL: "https://ultimatememories-64a97-default-rtdb.firebaseio.com",
        projectId: "ultimatememories-64a97",
        appId: "1:513888704426:web:b1476d30698d45dd117dd3",
        authDomain: "ultimatememories-64a97.firebaseapp.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let confirmationResult;

    function switchTo(page) {
        document.getElementById('screen-login').classList.add('hidden');
        document.getElementById('screen-register').classList.add('hidden');
        document.getElementById(page === 'login' ? 'screen-login' : 'screen-register').classList.remove('hidden');
    }

    // --- STEP 1: OTP BHEJNA ---
    function sendOTP() {
        const ph = document.getElementById('reg-phone').value.trim();
        if(!ph.startsWith('+91')) return alert("Number +91 se start karein!");

        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });
        
        auth.signInWithPhoneNumber(ph, window.recaptchaVerifier)
            .then((result) => {
                confirmationResult = result;
                alert("OTP bhej diya gaya hai!");
                document.getElementById('otp-section').classList.remove('hidden');
                document.getElementById('send-otp-btn').classList.add('hidden');
            }).catch((err) => alert("Error: " + err.message));
    }

    // --- STEP 2: VERIFY & SAVE ---
    function verifyOTP() {
        const code = document.getElementById('otp-code').value;
        const pass = document.getElementById('reg-pass').value;
        const ph = document.getElementById('reg-phone').value.trim();

        if(!code || !pass) return alert("OTP aur Password dono bhariye!");

        confirmationResult.confirm(code).then((result) => {
            // Success! Ab database mein save karte hain
            db.ref('users/' + ph.replace('+', '')).set({
                password: pass,
                verified: true
            }).then(() => {
                alert("Verification Success! Ab login karein.");
                location.reload();
            });
        }).catch(() => alert("Galat OTP!"));
    }

    function handleLogin() {
        const ph = document.getElementById('log-phone').value.trim().replace('+', '');
        const ps = document.getElementById('log-pass').value.trim();
        
        db.ref('users/' + ph).once('value', s => {
            if(s.exists() && s.val().password === ps) {
                document.getElementById('screen-login').classList.add('hidden');
                document.getElementById('screen-menu').classList.remove('hidden');
            } else {
                alert("Wrong details!");
            }
        });
    }

    // Hearts effect
    document.addEventListener('mousemove', (e) => { if(Math.random() > 0.9) createHeart(e.clientX, e.clientY); });
    function createHeart(x, y) {
        const h = document.createElement('div'); h.innerHTML = "❤️"; h.className = 'heart-particle';
        h.style.left = x + 'px'; h.style.top = y + 'px'; document.body.appendChild(h);
        setTimeout(() => h.remove(), 1000);
    }
</script>
</body>
</html>
