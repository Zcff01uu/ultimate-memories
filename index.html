<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Memories 💖</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --main-color: #d63384; --bg-color: #fff5f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .box { width: 100%; max-width: 400px; background: white; min-height: 100vh; position: relative; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        /* Auth */
        #screen-auth { padding: 40px 20px; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; box-sizing: border-box; }
        input { width: 100%; padding: 12px; border: 1.5px solid #fbcfe8; border-radius: 12px; outline: none; margin: 8px 0; background: #fff9fb; box-sizing: border-box; }
        .btn { background: var(--main-color); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }

        /* Navigation */
        #screen-main { display: none; flex-direction: column; height: 100vh; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 400px; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; }
        .nav-item { cursor: pointer; font-size: 22px; color: #ccc; }
        .nav-item.active { color: var(--main-color); }

        /* Search & Requests */
        .search-area { padding: 15px; border-bottom: 1px solid #eee; }
        .req-card { background: #fff0f5; padding: 10px; border-radius: 10px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .acc-btn { background: #2ecc71; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        /* Chat */
        #msg-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 60px; }
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 70%; font-size: 14px; }
        .msg.sent { background: var(--main-color); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.received { background: #f1f1f1; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }

        .content-section { flex: 1; padding: 15px; overflow-y: auto; display: none; margin-bottom: 60px; }
        .active-section { display: block; }
        #gallery { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; }
        .img-container { aspect-ratio: 1/1; background: #eee; overflow: hidden; }
        .img-card { width: 100%; height: 100%; object-fit: cover; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="box">
        <div id="screen-auth" class="animate__animated animate__fadeIn">
            <h1 style="color:var(--main-color)">Memories Social 💖</h1>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="handleAuth()">Login / Register</button>
        </div>

        <div id="screen-main">
            <div id="sec-home" class="content-section active-section">
                <div class="search-area">
                    <h3 style="margin-top:0">Find Friend 🔍</h3>
                    <div style="display:flex; gap:5px;">
                        <input type="text" id="searchUser" placeholder="Enter Username..." style="margin:0;">
                        <button onclick="sendRequest()" class="btn" style="width:70px; padding:5px;">Add</button>
                    </div>
                    <div id="pending-list"></div>
                </div>
                
                <div id="chat-area" class="hidden">
                    <h3 id="partner-name" style="color:var(--main-color); text-align:center;"></h3>
                    <div id="msg-container"></div>
                    <div style="display:flex; gap:5px; position:fixed; bottom:70px; width:100%; max-width:370px; padding:0 15px; background:white;">
                        <input type="text" id="msgInput" placeholder="Message..." style="margin:0;">
                        <button onclick="sendMsg()" class="btn" style="width:50px; margin:0;">➔</button>
                    </div>
                </div>
                <div id="no-partner" style="text-align:center; padding:50px; color:#bbb;">Search a friend to start chatting!</div>
            </div>

            <div id="sec-gallery" class="content-section">
                <h1>Our Gallery 📸</h1>
                <div id="gallery"></div>
            </div>

            <div id="sec-upload" class="content-section">
                <h1>Post Memory ✨</h1>
                <input type="file" id="filePicker">
                <button class="btn" onclick="uploadImg()" id="up-btn">Upload to Shared Space</button>
                <br><br>
                <button onclick="location.reload()" style="background:none; border:none; color:red; cursor:pointer;">Logout</button>
            </div>

            <div class="bottom-nav">
                <div class="nav-item active" onclick="showSec('home', this)">🏠</div>
                <div class="nav-item" onclick="showSec('gallery', this)">📸</div>
                <div class="nav-item" onclick="showSec('upload', this)">📤</div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA7fMm1LjMOz4BefGk60cmMuSoFzBvJapg",
        databaseURL: "https://ultimatememories-64a97-default-rtdb.firebaseio.com",
        projectId: "ultimatememories-64a97",
        appId: "1:513888704426:web:b1476d30698d45dd117dd3",
        authDomain: "ultimatememories-64a97.firebaseapp.com"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    
    let myUser = "";
    let myUid = "";
    let sharedId = "";

    function handleAuth() {
        myUser = document.getElementById('username').value.trim().toLowerCase();
        const pass = document.getElementById('pass').value;
        const email = myUser + "@social.com";

        auth.signInWithEmailAndPassword(email, pass).then(u => {
            myUid = u.user.uid; startApp();
        }).catch(() => {
            auth.createUserWithEmailAndPassword(email, pass).then(u => {
                myUid = u.user.uid;
                db.ref('users/' + myUser).set(myUid);
                startApp();
            });
        });
    }

    function startApp() {
        document.getElementById('screen-auth').style.display = 'none';
        document.getElementById('screen-main').style.display = 'flex';
        listenRequests();
        checkPartner();
    }

    function showSec(id, el) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active-section'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('sec-' + id).classList.add('active-section');
        el.classList.add('active');
    }

    // Friend Request Logic
    function sendRequest() {
        const target = document.getElementById('searchUser').value.trim().toLowerCase();
        db.ref('users/' + target).once('value', s => {
            if(s.exists()) {
                db.ref('requests/' + s.val() + '/' + myUser).set(myUid);
                alert("Request Sent to " + target);
            } else alert("User not found!");
        });
    }

    function listenRequests() {
        db.ref('requests/' + myUid).on('value', s => {
            const list = document.getElementById('pending-list');
            list.innerHTML = "";
            s.forEach(child => {
                list.innerHTML += `<div class="req-card"><span>${child.key} wants to chat</span> 
                <button class="acc-btn" onclick="acceptReq('${child.key}', '${child.val()}')">Accept</button></div>`;
            });
        });
    }

    function acceptReq(name, uid) {
        const sId = myUid < uid ? myUid + uid : uid + myUid;
        db.ref('partners/' + myUid).set({ name: name, sId: sId });
        db.ref('partners/' + uid).set({ name: myUser, sId: sId });
        db.ref('requests/' + myUid + '/' + name).remove();
    }

    function checkPartner() {
        db.ref('partners/' + myUid).on('value', s => {
            if(s.exists()) {
                const data = s.val();
                sharedId = data.sId;
                document.getElementById('no-partner').classList.add('hidden');
                document.getElementById('chat-area').classList.remove('hidden');
                document.getElementById('partner-name').innerText = "Chat with " + data.name;
                loadContent();
            }
        });
    }

    function loadContent() {
        db.ref('chats/' + sharedId).on('value', snap => {
            const con = document.getElementById('msg-container'); con.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                con.innerHTML += `<div class="msg ${d.u===myUser?'sent':'received'}">${d.t}</div>`;
            });
            con.scrollTop = con.scrollHeight;
        });
        db.ref('photos/' + sharedId).on('value', snap => {
            const gal = document.getElementById('gallery'); gal.innerHTML = "";
            snap.forEach(c => gal.innerHTML += `<div class="img-container"><img src="${c.val()}" class="img-card"></div>`);
        });
    }

    async function uploadImg() {
        const file = document.getElementById('filePicker').files[0];
        if(!file || !sharedId) return alert("Connect a friend first!");
        const btn = document.getElementById('up-btn'); btn.innerText = "Uploading...";
        const formData = new FormData(); formData.append("image", file);
        const res = await fetch("https://api.imgbb.com/1/upload?key=cb53c38c41a5ce7d642d1152d306da9a", {method:"POST", body:formData});
        const data = await res.json();
        db.ref('photos/' + sharedId).push(data.data.url);
        btn.innerText = "Upload to Shared Space";
        showSec('gallery', document.querySelectorAll('.nav-item')[1]);
    }

    function sendMsg() {
        const t = document.getElementById('msgInput').value;
        if(t && sharedId) db.ref('chats/' + sharedId).push({ u: myUser, t: t });
        document.getElementById('msgInput').value = "";
    }
</script>
</body>
</html>
