<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Memories 💖</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --main-color: #d63384; --bg-color: #ffffff; --insta-gray: #fafafa; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--insta-gray); margin: 0; display: flex; justify-content: center; }
        
        .app-container { width: 100%; max-width: 450px; background: white; min-height: 100vh; position: relative; display: flex; flex-direction: column; box-shadow: 0 0 10px rgba(0,0,0,0.05); }

        /* --- LOGIN SCREEN --- */
        #screen-auth { padding: 40px 30px; display: flex; flex-direction: column; justify-content: center; height: 100vh; box-sizing: border-box; text-align: center; }
        .insta-logo { font-family: 'Brush Script MT', cursive; font-size: 40px; margin-bottom: 30px; color: #262626; }
        .auth-input { width: 100%; padding: 12px; border: 1px solid #dbdbdb; border-radius: 5px; background: var(--insta-gray); margin-bottom: 10px; font-size: 14px; }
        .auth-btn { background: #0095f6; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .toggle-link { color: #0095f6; font-size: 14px; margin-top: 20px; cursor: pointer; font-weight: 600; }

        /* --- MAIN APP INTERFACE --- */
        #screen-main { display: none; flex-direction: column; height: 100vh; width: 100%; }
        
        /* Header */
        header { padding: 15px; border-bottom: 1px solid #dbdbdb; display: flex; justify-content: space-between; align-items: center; background: white; position: sticky; top: 0; z-index: 10; }
        header h2 { margin: 0; font-size: 18px; }

        /* Content Area */
        .content-scroll { flex: 1; overflow-y: auto; padding-bottom: 70px; }
        .section { display: none; padding: 10px; }
        .active-section { display: block; }

        /* Chat Style */
        #msg-container { display: flex; flex-direction: column; gap: 8px; padding: 10px; }
        .msg { padding: 10px 16px; border-radius: 20px; max-width: 75%; font-size: 14px; line-height: 1.4; }
        .sent { background: #3797f0; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .received { background: #efefef; color: #262626; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        .chat-input-area { position: fixed; bottom: 65px; width: 100%; max-width: 450px; background: white; padding: 10px; display: flex; gap: 10px; border-top: 1px solid #dbdbdb; box-sizing: border-box; }
        .chat-input { flex: 1; border: 1px solid #dbdbdb; border-radius: 20px; padding: 8px 15px; outline: none; }

        /* Gallery Style */
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .gallery-item { aspect-ratio: 1/1; background: #eee; overflow: hidden; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: white; border-top: 1px solid #dbdbdb; display: flex; justify-content: space-around; padding: 12px 0; z-index: 100; }
        .nav-btn { cursor: pointer; font-size: 24px; color: #262626; filter: grayscale(1); transition: 0.2s; }
        .nav-btn.active { filter: grayscale(0); transform: scale(1.1); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="screen-auth" class="animate__animated animate__fadeIn">
            <div class="insta-logo">Memories</div>
            <input type="text" id="username" class="auth-input" placeholder="Username">
            <input type="password" id="pass" class="auth-input" placeholder="Password">
            <button class="auth-btn" id="btn-action" onclick="handleAuth()">Log In</button>
            <div class="toggle-link" onclick="toggleMode()" id="mode-text">Don't have an account? Sign Up</div>
        </div>

        <div id="screen-main">
            <header>
                <h2 id="header-title">Home</h2>
                <span onclick="location.reload()" style="font-size: 12px; color: #999; cursor: pointer;">Logout</span>
            </header>

            <div class="content-scroll">
                <div id="sec-home" class="section active-section">
                    <div id="msg-container"></div>
                    <div class="chat-input-area">
                        <input type="text" id="msgInput" class="chat-input" placeholder="Message...">
                        <button onclick="sendMsg()" style="background:none; border:none; color:#0095f6; font-weight:bold; cursor:pointer;">Send</button>
                    </div>
                </div>

                <div id="sec-search" class="section">
                    <div style="padding: 10px;">
                        <input type="text" id="searchUser" class="auth-input" placeholder="Search username to add partner...">
                        <button class="auth-btn" style="width:100%" onclick="sendRequest()">Send Friend Request</button>
                        <div id="request-list" style="margin-top:20px;"></div>
                    </div>
                </div>

                <div id="sec-gallery" class="section">
                    <div class="gallery-grid" id="gallery"></div>
                </div>

                <div id="sec-upload" class="section">
                    <div style="text-align:center; padding:50px 20px;">
                        <h3>Create New Post</h3>
                        <input type="file" id="filePicker" style="margin-bottom: 20px;">
                        <button class="auth-btn" id="up-btn" onclick="uploadImg()">Share to Gallery</button>
                    </div>
                </div>
            </div>

            <div class="bottom-nav">
                <div class="nav-btn active" onclick="changeTab('home', this)">🏠</div>
                <div class="nav-btn" onclick="changeTab('search', this)">🔍</div>
                <div class="nav-btn" onclick="changeTab('upload', this)">➕</div>
                <div class="nav-btn" onclick="changeTab('gallery', this)">🖼️</div>
            </div>
        </div>
    </div>

<script>
    // Firebase Config (Aapka original config)
    const firebaseConfig = {
        apiKey: "AIzaSyA7fMm1LjMOz4BefGk60cmMuSoFzBvJapg",
        databaseURL: "https://ultimatememories-64a97-default-rtdb.firebaseio.com",
        projectId: "ultimatememories-64a97",
        appId: "1:513888704426:web:b1476d30698d45dd117dd3",
        authDomain: "ultimatememories-64a97.firebaseapp.com"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let isLogin = true;
    let myUser = "", myUid = "", sharedId = "";

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('btn-action').innerText = isLogin ? "Log In" : "Sign Up";
        document.getElementById('mode-text').innerText = isLogin ? "Don't have an account? Sign Up" : "Already have an account? Log In";
    }

    function handleAuth() {
        myUser = document.getElementById('username').value.trim().toLowerCase();
        const pass = document.getElementById('pass').value;
        const email = myUser + "@memories.com";

        if(isLogin) {
            auth.signInWithEmailAndPassword(email, pass).then(u => { myUid = u.user.uid; startApp(); })
            .catch(() => alert("Login failed! Check username/password."));
        } else {
            auth.createUserWithEmailAndPassword(email, pass).then(u => {
                myUid = u.user.uid;
                db.ref('users/' + myUser).set(myUid);
                alert("Account Created! Now Log In.");
                location.reload();
            }).catch(e => alert(e.message));
        }
    }

    function startApp() {
        document.getElementById('screen-auth').style.display = 'none';
        document.getElementById('screen-main').style.display = 'flex';
        
        // Listen for requests
        db.ref('requests/' + myUid).on('value', s => {
            const list = document.getElementById('request-list');
            list.innerHTML = "<h4>Pending Requests</h4>";
            s.forEach(child => {
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; background:#fafafa; margin-bottom:5px; border-radius:5px;">
                    <span>${child.key}</span>
                    <button onclick="acceptReq('${child.key}', '${child.val()}')" style="background:#0095f6; color:white; border:none; padding:5px 10px; border-radius:4px;">Accept</button>
                </div>`;
            });
        });
        checkPartner();
    }

    function changeTab(tabId, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        document.getElementById('sec-' + tabId).classList.add('active-section');
        el.classList.add('active');
        document.getElementById('header-title').innerText = tabId.charAt(0).toUpperCase() + tabId.slice(1);
    }

    // --- Social & Chat Logic ---
    function sendRequest() {
        const target = document.getElementById('searchUser').value.trim().toLowerCase();
        db.ref('users/' + target).once('value', s => {
            if(s.exists()) {
                db.ref('requests/' + s.val() + '/' + myUser).set(myUid);
                alert("Request sent!");
            } else alert("User not found!");
        });
    }

    function acceptReq(name, uid) {
        const sId = myUid < uid ? myUid + uid : uid + myUid;
        db.ref('partners/' + myUid).set({ name: name, sId: sId });
        db.ref('partners/' + uid).set({ name: myUser, sId: sId });
        db.ref('requests/' + myUid + '/' + name).remove();
    }

    function checkPartner() {
        db.ref('partners/' + myUid).on('value', s => {
            if(s.exists()) {
                sharedId = s.val().sId;
                loadContent();
            }
        });
    }

    function loadContent() {
        db.ref('chats/' + sharedId).on('value', snap => {
            const con = document.getElementById('msg-container'); con.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                con.innerHTML += `<div class="msg ${d.u===myUser?'sent':'received'}">${d.t}</div>`;
            });
            con.scrollTop = con.scrollHeight;
        });
        db.ref('photos/' + sharedId).on('value', snap => {
            const gal = document.getElementById('gallery'); gal.innerHTML = "";
            snap.forEach(c => {
                gal.innerHTML += `<div class="gallery-item"><img src="${c.val()}"></div>`;
            });
        });
    }

    async function uploadImg() {
        const file = document.getElementById('filePicker').files[0];
        if(!file || !sharedId) return alert("Add a partner first!");
        const btn = document.getElementById('up-btn'); btn.innerText = "Sharing...";
        const formData = new FormData(); formData.append("image", file);
        const res = await fetch("https://api.imgbb.com/1/upload?key=cb53c38c41a5ce7d642d1152d306da9a", {method:"POST", body:formData});
        const data = await res.json();
        db.ref('photos/' + sharedId).push(data.data.url);
        btn.innerText = "Share to Gallery";
        alert("Posted!");
        changeTab('gallery', document.querySelectorAll('.nav-btn')[3]);
    }

    function sendMsg() {
        const t = document.getElementById('msgInput').value;
        if(t && sharedId) {
            db.ref('chats/' + sharedId).push({ u: myUser, t: t });
            document.getElementById('msgInput').value = "";
        }
    }
</script>
</body>
</html>
