<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memories Social 💖</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --accent: #d63384; --bg: #fff5f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .auth-box { padding: 50px 30px; text-align: center; }
        .logo-text { font-family: 'Brush Script MT', cursive; font-size: 48px; color: var(--accent); margin-bottom: 40px; }
        .input-group { position: relative; width: 100%; margin-bottom: 15px; }
        .input-field { width: 90%; padding: 14px; border: 1px solid #ffc1e3; border-radius: 10px; background: #fdf2f7; outline: none; }
        .eye-btn { position: absolute; right: 25px; top: 15px; cursor: pointer; }
        .btn-primary { width: 96%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        #error-msg { color: #d63384; font-size: 14px; margin: 10px 0; font-weight: bold; min-height: 20px; }
        .switch-link { margin-top: 20px; display: block; color: var(--accent); cursor: pointer; font-size: 14px; text-decoration: underline; }
        .hidden { display: none !important; }
        header { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; padding: 12px 0; }
        .nav-icon { font-size: 22px; cursor: pointer; color: #ccc; }
        .nav-icon.active { color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-auth" class="auth-box">
        <div class="logo-text">Memories</div>
        <div class="input-group">
            <input type="text" id="email" class="input-field" placeholder="Username">
        </div>
        <div class="input-group">
            <input type="password" id="pass" class="input-field" placeholder="Password">
            <span class="eye-btn" onclick="togglePass()">👁️</span>
        </div>
        <div id="error-msg"></div>
        <div id="login-section">
            <button class="btn-primary" onclick="loginUser()">Log In</button>
            <span class="switch-link" onclick="toggleAuth(false)">New here? Create Account</span>
        </div>
        <div id="signup-section" class="hidden">
            <button class="btn-primary" onclick="signupUser()">Sign Up</button>
            <span class="switch-link" onclick="toggleAuth(true)">Have account? Log In</span>
        </div>
    </div>

    <div id="screen-app" class="hidden">
        <header>
            <div class="logo-text" style="font-size: 24px; margin: 0;">Memories</div>
            <button onclick="logout()" style="border:none; background:none; color:red; cursor:pointer;">Logout</button>
        </header>
        <div id="view-home" style="padding:20px; text-align:center;">
            <h3>Welcome, <span id="display-name"></span>!</h3>
            <p>Go to Search (🔍) to find friends.</p>
        </div>
        <nav>
            <div onclick="alert('Home')" class="nav-icon active">🏠</div>
            <div onclick="alert('Search coming soon')" class="nav-icon">🔍</div>
            <div onclick="alert('Profile')" class="nav-icon">👤</div>
        </nav>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyA7fMm1LjMOz4BefGk60cmMuSoFzBvJapg",
        databaseURL: "https://ultimatememories-64a97-default-rtdb.firebaseio.com",
        projectId: "ultimatememories-64a97",
        authDomain: "ultimatememories-64a97.firebaseapp.com"
    };
    firebase.initializeApp(config);
    const auth = firebase.auth(), db = firebase.database();

    function toggleAuth(isLogin) {
        document.getElementById('login-section').classList.toggle('hidden', !isLogin);
        document.getElementById('signup-section').classList.toggle('hidden', isLogin);
        document.getElementById('error-msg').innerText = "";
    }

    function togglePass() {
        const p = document.getElementById('pass');
        p.type = p.type === "password" ? "text" : "password";
    }

    // LOGIN
    async function loginUser() {
        const err = document.getElementById('error-msg');
        const u = document.getElementById('email').value.toLowerCase().trim();
        const p = document.getElementById('pass').value;

        if(!u || p.length < 6) return err.innerText = "Username/Password (min 6) missing!";
        
        err.style.color = "blue";
        err.innerText = "Logging in...";

        // Timeout to prevent getting stuck
        const timeout = setTimeout(() => {
            err.style.color = "red";
            err.innerText = "Network slow. Please refresh.";
        }, 15000);

        try {
            await auth.signInWithEmailAndPassword(u + "@m.com", p);
            clearTimeout(timeout);
        } catch(e) {
            clearTimeout(timeout);
            err.style.color = "red";
            if(e.code === "auth/wrong-password") err.innerText = "Wrong Password! Check symbols/caps.";
            else if(e.code === "auth/user-not-found") err.innerText = "Username doesn't exist. Sign Up first!";
            else err.innerText = e.message;
        }
    }

    // SIGNUP
    async function signupUser() {
        const err = document.getElementById('error-msg');
        const u = document.getElementById('email').value.toLowerCase().trim();
        const p = document.getElementById('pass').value;

        if(!u || p.length < 6) return err.innerText = "6+ chars needed for username & password!";

        err.style.color = "blue";
        err.innerText = "Creating account...";
        try {
            const check = await db.ref('users/' + u).once('value');
            if(check.exists()) return err.innerText = "Username taken! Try another.";
            
            const res = await auth.createUserWithEmailAndPassword(u + "@m.com", p);
            await db.ref('users/' + u).set(res.user.uid);
        } catch(e) {
            err.style.color = "red";
            err.innerText = e.message;
        }
    }

    // AUTH STATE
    auth.onAuthStateChanged(user => {
        if (user) {
            const uName = user.email.split('@')[0];
            document.getElementById('display-name').innerText = uName;
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-app').classList.remove('hidden');
        } else {
            document.getElementById('screen-auth').classList.remove('hidden');
            document.getElementById('screen-app').classList.add('hidden');
        }
    });

    function logout() { auth.signOut(); }
</script>
</body>
</html>
