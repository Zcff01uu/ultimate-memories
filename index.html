<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memories Social 💖</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --main: #0095f6; --pink: #d63384; --bg: #fafafa; --border: #dbdbdb; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; min-height: 100vh; position: relative; box-shadow: 0 0 15px rgba(0,0,0,0.05); }

        /* Auth Pages */
        .auth-box { padding: 40px; text-align: center; display: flex; flex-direction: column; height: 100vh; justify-content: center; box-sizing: border-box; }
        .logo { font-family: 'Brush Script MT', cursive; font-size: 50px; margin-bottom: 25px; color: #262626; }
        input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: #fafafa; margin-bottom: 12px; box-sizing: border-box; outline: none; }
        .btn-main { background: var(--main); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-main:disabled { background: #ccc; cursor: not-allowed; }

        /* App View */
        #main-app { display: none; flex-direction: column; height: 100vh; }
        header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: white; position: sticky; top: 0; z-index: 10; }
        .content { flex: 1; overflow-y: auto; padding-bottom: 80px; display: flex; flex-direction: column; }
        .view { display: none; padding: 15px; }
        .active-view { display: block; }

        /* Chat UI */
        #chat-msgs { display: flex; flex-direction: column; gap: 8px; padding: 10px; }
        .msg-bubble { padding: 10px 15px; border-radius: 18px; max-width: 75%; font-size: 14px; line-height: 1.4; }
        .chat-bar { position: fixed; bottom: 65px; width: 100%; max-width: 430px; padding: 10px; display: flex; gap: 5px; background: white; border-top: 1px solid var(--border); }

        /* User Card */
        .user-card { border: 1px solid var(--border); padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 12px; margin-top: 15px; background: white; }
        .avatar { width: 45px; height: 45px; background: #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* Bottom Nav */
        nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: white; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 0; z-index: 100; }
        .nav-icon { font-size: 26px; cursor: pointer; color: #262626; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="page-login" class="auth-box animate__animated animate__fadeIn">
        <div class="logo">Memories</div>
        <input type="text" id="login-user" placeholder="Username">
        <input type="password" id="login-pass" placeholder="Password">
        <button class="btn-main" onclick="handleLogin()">Log In</button>
        <p onclick="showAuth('register')" style="color:var(--main); cursor:pointer; margin-top:20px; font-size:14px;">Don't have an account? <b>Sign Up</b></p>
    </div>

    <div id="page-register" class="auth-box hidden animate__animated animate__fadeInRight">
        <div class="logo" style="color:var(--pink)">Sign Up</div>
        <input type="text" id="reg-user" placeholder="Choose Username">
        <input type="password" id="reg-pass" placeholder="Create Password">
        <button class="btn-main" style="background:var(--pink)" onclick="handleRegister()">Create Account</button>
        <p onclick="showAuth('login')" style="color:var(--pink); cursor:pointer; margin-top:20px; font-size:14px;">Already have an account? <b>Log In</b></p>
    </div>

    <div id="main-app">
        <header><b id="head-title">Memories</b> <span onclick="location.reload()" style="color:red; cursor:pointer; font-size:12px;">Logout</span></header>
        
        <div class="content">
            <div id="v-home" class="view active-view">
                <div id="chat-msgs"></div>
                <div id="chat-bar" class="chat-bar hidden">
                    <input type="text" id="msgText" placeholder="Message..." style="margin:0; border-radius:20px;">
                    <button onclick="sendMsg()" style="border:none; color:var(--main); background:none; font-weight:bold; cursor:pointer;">Send</button>
                </div>
            </div>

            <div id="v-search" class="view">
                <div style="display:flex; gap:5px;">
                    <input type="text" id="searchIn" placeholder="Search exact username..." style="margin:0;">
                    <button class="btn-main" style="width:80px;" onclick="searchUser()">Search</button>
                </div>
                <div id="search-output"></div>
                <div id="notif-area" style="margin-top:30px;">
                    <h4 style="border-bottom:1px solid #eee; padding-bottom:10px;">Notifications</h4>
                </div>
            </div>

            <div id="v-profile" class="view">
                <div style="text-align:center; padding:20px;">
                    <div class="avatar" style="width:80px; height:80px; margin:0 auto 10px; font-size:35px;">👤</div>
                    <h3 id="display-u">User</h3>
                    <input type="file" id="imgFile">
                    <button class="btn-main" onclick="upload()">Post Memory</button>
                </div>
                <div id="gallery" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:2px;"></div>
            </div>
        </div>

        <nav>
            <div class="nav-icon" onclick="changeTab('home')">🏠</div>
            <div class="nav-icon" onclick="changeTab('search')">🔍</div>
            <div class="nav-icon" onclick="changeTab('profile')">👤</div>
        </nav>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA7fMm1LjMOz4BefGk60cmMuSoFzBvJapg",
        databaseURL: "https://ultimatememories-64a97-default-rtdb.firebaseio.com",
        projectId: "ultimatememories-64a97",
        appId: "1:513888704426:web:b1476d30698d45dd117dd3",
        authDomain: "ultimatememories-64a97.firebaseapp.com"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let myU = "", myId = "", pId = "";

    function showAuth(p) {
        document.getElementById('page-login').classList.add('hidden');
        document.getElementById('page-register').classList.add('hidden');
        document.getElementById('page-' + p).classList.remove('hidden');
    }

    function handleRegister() {
        let u = document.getElementById('reg-user').value.toLowerCase().trim();
        let p = document.getElementById('reg-pass').value;
        if(!u || p.length < 6) return alert("Username & Password (min 6) required!");
        
        auth.createUserWithEmailAndPassword(u + "@m.com", p).then(res => {
            db.ref('users/' + u).set(res.user.uid).then(() => {
                alert("Registration Successful!");
                showAuth('login');
            });
        }).catch(err => alert(err.message));
    }

    function handleLogin() {
        myU = document.getElementById('login-user').value.toLowerCase().trim();
        let p = document.getElementById('login-pass').value;
        auth.signInWithEmailAndPassword(myU + "@m.com", p).then(res => {
            myId = res.user.uid;
            document.getElementById('display-u').innerText = myU;
            document.getElementById('page-login').classList.add('hidden');
            document.getElementById('main-app').style.display = 'flex';
            initApp();
        }).catch(() => alert("Error logging in!"));
    }

    function initApp() {
        // Monitor Partner Status
        db.ref('partners/' + myId).on('value', s => {
            const chatBox = document.getElementById('chat-msgs');
            const chatBar = document.getElementById('chat-bar');
            if(s.exists()){
                pId = s.val().sId;
                chatBar.classList.remove('hidden');
                syncData();
            } else {
                chatBox.innerHTML = "<p style='text-align:center; padding:50px; color:#999;'>No partner connected. Go to Search to add someone!</p>";
                chatBar.classList.add('hidden');
            }
        });

        // Monitor Notifications
        db.ref('requests/' + myId).on('value', s => {
            let area = document.getElementById('notif-area');
            area.innerHTML = "<h4>Notifications</h4>";
            s.forEach(c => {
                area.innerHTML += `<div class="user-card animate__animated animate__fadeIn">
                    <div class="avatar">👤</div>
                    <div style="flex:1"><b>${c.key}</b></div>
                    <button onclick="accept('${c.key}','${c.val()}')" style="background:var(--main); color:white; border:none; padding:6px 12px; border-radius:5px;">Accept</button>
                </div>`;
            });
        });
    }

    function searchUser() {
        let t = document.getElementById('searchIn').value.toLowerCase().trim();
        let out = document.getElementById('search-output');
        out.innerHTML = "Searching...";

        if(t === myU) return out.innerHTML = "That's you!";

        db.ref('users/' + t).once('value', s => {
            if(s.exists()) {
                let targetId = s.val();
                db.ref('requests/' + targetId + '/' + myU).once('value', reqS => {
                    let sent = reqS.exists();
                    out.innerHTML = `<div class="user-card animate__animated animate__fadeIn">
                        <div class="avatar">👤</div>
                        <div style="flex:1"><b>${t}</b></div>
                        <button id="sBtn" class="btn-main" style="width:110px; background:${sent?'#ccc':'#0095f6'}" ${sent?'disabled':''} onclick="sendReq('${t}','${targetId}')">
                            ${sent ? 'Requested' : 'Send Request'}
                        </button>
                    </div>`;
                });
            } else {
                out.innerHTML = "<p style='color:red; text-align:center;'>User not found!</p>";
            }
        });
    }

    function sendReq(name, id) {
        db.ref('requests/' + id + '/' + myU).set(myId).then(() => {
            const b = document.getElementById('sBtn');
            b.innerText = "Requested";
            b.style.background = "#ccc";
            b.disabled = true;
        });
    }

    function accept(name, id) {
        let pair = myId < id ? myId + id : id + myId;
        db.ref('partners/' + myId).set({ name: name, sId: pair });
        db.ref('partners/' + id).set({ name: myU, sId: pair });
        db.ref('requests/' + myId + '/' + name).remove().then(() => {
            changeTab('home');
        });
    }

    function changeTab(t) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
        document.getElementById('v-' + t).classList.add('active-view');
    }

    function syncData() {
        db.ref('chats/' + pId).on('value', s => {
            let box = document.getElementById('chat-msgs'); box.innerHTML = "";
            s.forEach(m => {
                let d = m.val();
                let side = d.u === myU ? "align-self:flex-end; background:var(--main); color:white;" : "align-self:flex-start; background:#efefef;";
                box.innerHTML += `<div class="msg-bubble animate__animated animate__fadeInUp" style="${side}">${d.t}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
        db.ref('pics/' + pId).on('value', s => {
            let g = document.getElementById('gallery'); g.innerHTML = "";
            s.forEach(p => g.innerHTML += `<img src="${p.val()}" style="width:100%; aspect-ratio:1/1; object-fit:cover;">`);
        });
    }

    function sendMsg() {
        let t = document.getElementById('msgText').value;
        if(t && pId) db.ref('chats/' + pId).push({ u: myU, t: t });
        document.getElementById('msgText').value = "";
    }

    async function upload() {
        let f = document.getElementById('imgFile').files[0];
        if(!f || !pId) return alert("Select photo & connect partner!");
        let fd = new FormData(); fd.append("image", f);
        let res = await fetch("https://api.imgbb.com/1/upload?key=cb53c38c41a5ce7d642d1152d306da9a", {method:"POST", body:fd});
        let d = await res.json();
        db.ref('pics/' + pId).push(d.data.url);
        alert("Photo Shared!");
    }
</script>
</body>
</html>
