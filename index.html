<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memories Social 💖</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --accent: #d63384; --bg: #fff5f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        /* Auth UI */
        .auth-box { padding: 50px 30px; text-align: center; }
        .logo-text { font-family: 'Brush Script MT', cursive; font-size: 48px; color: var(--accent); margin-bottom: 40px; }
        .input-group { position: relative; width: 100%; margin-bottom: 15px; }
        .input-field { width: 90%; padding: 14px; border: 1px solid #ffc1e3; border-radius: 10px; background: #fdf2f7; outline: none; }
        .btn-primary { width: 96%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        #error-msg { color: #d63384; font-size: 14px; margin: 10px 0; font-weight: bold; }

        /* Main App UI */
        header { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: white; }
        .heart-icon { color: #ff3b7b; font-size: 20px; }
        .inbox-item { padding: 15px; border-bottom: 1px solid #f9f9f9; display: flex; align-items: center; cursor: pointer; position: relative; }
        .avatar { width: 45px; height: 45px; background: #ffd1dc; border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        /* Instagram Style Red Dot */
        .msg-dot { width: 10px; height: 10px; background: #ff3b7b; border-radius: 50%; position: absolute; right: 20px; display: none; }
        .has-new-msg .msg-dot { display: block; }
        
        /* Chat Design */
        #chat-screen { position: fixed; top: 0; width: 100%; max-width: 450px; height: 100%; background: white; z-index: 1000; display: none; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #fffafa; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 70%; font-size: 14px; word-wrap: break-word; }
        .sent { align-self: flex-end; background: var(--accent); color: white; }
        .received { align-self: flex-start; background: #efefef; color: #333; }
        
        nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; padding: 12px 0; }
        .nav-icon { font-size: 22px; cursor: pointer; color: #ccc; }
        .nav-icon.active { color: var(--accent); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-auth" class="auth-box">
        <div class="logo-text">Memories</div>
        <div class="input-group"><input type="text" id="email" class="input-field" placeholder="Username"></div>
        <div class="input-group"><input type="password" id="pass" class="input-field" placeholder="Password"></div>
        <div id="error-msg"></div>
        <div id="login-section">
            <button class="btn-primary" onclick="authProcess(true)">Log In</button>
            <p onclick="toggleAuth(false)" style="cursor:pointer; color:var(--accent); font-size:14px; margin-top:20px;">Create New Account</p>
        </div>
        <div id="signup-section" class="hidden">
            <button class="btn-primary" onclick="authProcess(false)">Sign Up</button>
            <p onclick="toggleAuth(true)" style="cursor:pointer; color:var(--accent); font-size:14px; margin-top:20px;">Already have an account? Login</p>
        </div>
    </div>

    <div id="screen-app" class="hidden">
        <header>
            <div class="logo-text" style="font-size: 24px; margin: 0;">Memories</div>
            <div class="heart-icon">❤️</div>
        </header>

        <div id="view-home" class="view">
            <h4 style="margin: 15px;">Messages</h4>
            <div id="inbox-list"></div>
        </div>

        <div id="view-search" class="view hidden" style="padding:15px;">
            <div style="display:flex; gap:5px;">
                <input type="text" id="search-user" class="input-field" placeholder="Find user..." style="width:70%">
                <button class="btn-primary" onclick="findUser()" style="width:25%; margin:0; padding:10px;">Go</button>
            </div>
            <div id="search-res" style="margin-top:20px;"></div>
            <h4>Requests</h4>
            <div id="req-list"></div>
        </div>

        <div id="view-profile" class="view hidden" style="text-align:center; padding-top:40px;">
            <div class="avatar" style="width:80px; height:80px; margin:0 auto; font-size:35px;">👤</div>
            <h2 id="my-name-display">User</h2>
            <button onclick="logout()" style="color:red; background:none; border:none; font-weight:bold; margin-top:100px; cursor:pointer;">LOGOUT</button>
        </div>

        <div id="chat-screen">
            <div style="padding:15px; border-bottom:1px solid #eee; display:flex; align-items:center; gap:15px;">
                <span onclick="closeChat()" style="cursor:pointer; font-size:24px;">←</span>
                <span id="chat-name" style="font-weight:bold;">User</span>
            </div>
            <div id="messages"></div>
            <div style="padding:10px; display:flex; gap:8px;">
                <input type="text" id="msg-input" placeholder="Message..." style="flex:1; border:1px solid #ddd; border-radius:20px; padding:10px;">
                <button onclick="sendMsg()" style="border:none; background:none; color:var(--accent); font-weight:bold;">Send</button>
            </div>
        </div>

        <nav>
            <div onclick="tab('home')" id="nav-home" class="nav-icon active">🏠</div>
            <div onclick="tab('search')" id="nav-search" class="nav-icon">🔍</div>
            <div onclick="tab('profile')" id="nav-profile" class="nav-icon">👤</div>
        </nav>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyA7fMm1LjMOz4BefGk60cmMuSoFzBvJapg",
        databaseURL: "https://ultimatememories-64a97-default-rtdb.firebaseio.com",
        projectId: "ultimatememories-64a97",
        authDomain: "ultimatememories-64a97.firebaseapp.com"
    };
    firebase.initializeApp(config);
    const auth = firebase.auth(), db = firebase.database();

    let myU = "", myId = "", activeRoom = "";

    auth.onAuthStateChanged(user => {
        if (user) {
            db.ref('users').orderByValue().equalTo(user.uid).once('value', s => {
                if(s.exists()) {
                    myU = Object.keys(s.val())[0];
                    startApp(user.uid);
                }
            });
        } else {
            document.getElementById('screen-auth').classList.remove('hidden');
            document.getElementById('screen-app').classList.add('hidden');
        }
    });

    function toggleAuth(isLogin) {
        document.getElementById('login-section').classList.toggle('hidden', !isLogin);
        document.getElementById('signup-section').classList.toggle('hidden', isLogin);
    }

    async function authProcess(isLogin) {
        const err = document.getElementById('error-msg');
        const u = document.getElementById('email').value.toLowerCase().trim();
        const p = document.getElementById('pass').value;
        if(!u || p.length < 6) return err.innerText = "Username/Password error!";
        
        err.innerText = "Processing...";
        try {
            if(isLogin) await auth.signInWithEmailAndPassword(u + "@m.com", p);
            else {
                const res = await auth.createUserWithEmailAndPassword(u + "@m.com", p);
                await db.ref('users/' + u).set(res.user.uid);
            }
        } catch(e) { err.innerText = e.message; }
    }

    function startApp(uid) {
        myId = uid;
        document.getElementById('screen-auth').classList.add('hidden');
        document.getElementById('screen-app').classList.remove('hidden');
        document.getElementById('my-name-display').innerText = myU;

        // Inbox Listener with Red Dot Logic
        db.ref('partners/' + myId).on('value', s => {
            const list = document.getElementById('inbox-list'); list.innerHTML = "";
            s.forEach(p => {
                const name = p.key;
                const roomId = p.val().sId;
                list.innerHTML += `<div class="inbox-item" id="item-${name}" onclick="openChat('${name}', '${roomId}')">
                    <div class="avatar">👤</div>
                    <div><b>${name}</b><br><small>Tap to chat</small></div>
                    <div class="msg-dot"></div>
                </div>`;
                
                // Red dot check for new messages
                db.ref('chats/' + roomId).limitToLast(1).on('child_added', snap => {
                    if(snap.val().u !== myU && document.getElementById('chat-screen').style.display !== 'flex') {
                        document.getElementById('item-' + name).classList.add('has-new-msg');
                    }
                });
            });
        });

        // Request Listener
        db.ref('requests/' + myId).on('value', s => {
            const rl = document.getElementById('req-list'); rl.innerHTML = "";
            s.forEach(r => {
                rl.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; background:#fffafa; margin-bottom:5px;">
                    <span>${r.key}</span>
                    <button onclick="accept('${r.key}','${r.val()}')">Accept</button>
                </div>`;
            });
        });
    }

    function findUser() {
        let q = document.getElementById('search-user').value.toLowerCase().trim();
        db.ref('users/' + q).once('value', s => {
            if(s.exists() && q !== myU) {
                document.getElementById('search-res').innerHTML = `<div style="display:flex; justify-content:space-between; padding:10px; border:1px solid #eee;">
                    <b>${q}</b><button onclick="sendReq('${q}','${s.val()}')">Add</button>
                </div>`;
            } else alert("Not found");
        });
    }

    function sendReq(n, id) { db.ref('requests/' + id + '/' + myU).set(myId); alert("Sent!"); }
    function accept(n, id) {
        let room = myId < id ? myId + id : id + myId;
        db.ref('partners/' + myId + '/' + n).set({ sId: room });
        db.ref('partners/' + id + '/' + myU).set({ sId: room });
        db.ref('requests/' + myId + '/' + n).remove();
    }

    function openChat(name, roomId) {
        activeRoom = roomId;
        document.getElementById('item-' + name).classList.remove('has-new-msg');
        document.getElementById('chat-name').innerText = name;
        document.getElementById('chat-screen').style.display = 'flex';
        db.ref('chats/' + roomId).on('value', s => {
            const cont = document.getElementById('messages'); cont.innerHTML = "";
            s.forEach(m => {
                cont.innerHTML += `<div class="msg ${m.val().u === myU ? 'sent' : 'received'}">${m.val().t}</div>`;
            });
            cont.scrollTop = cont.scrollHeight;
        });
    }

    function closeChat() { document.getElementById('chat-screen').style.display = 'none'; }
    function sendMsg() {
        let t = document.getElementById('msg-input').value;
        if(t && activeRoom) {
            db.ref('chats/' + activeRoom).push({ u: myU, t: t });
            document.getElementById('msg-input').value = "";
        }
    }
    function tab(name) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
        document.getElementById('view-' + name).classList.remove('hidden');
        document.getElementById('nav-' + name).classList.add('active');
    }
    function logout() { auth.signOut(); }
</script>
</body>
</html>
