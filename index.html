<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couple Vault 💖 | Private Memories</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #fff5f8; text-align: center; padding: 20px; color: #333; margin: 0; }
        .box { max-width: 400px; margin: 40px auto; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border: 1.5px solid #ffdae9; }
        h1 { color: #d63384; font-size: 26px; margin-bottom: 10px; }
        p { color: #888; font-size: 14px; margin-bottom: 20px; }
        
        .input-group { position: relative; width: 100%; margin: 10px 0; }
        input { width: 85%; padding: 14px; border: 1px solid #fbcfe8; border-radius: 12px; outline: none; background: #fff9fb; font-size: 16px; }
        
        .toggle-btn { position: absolute; right: 25px; top: 15px; cursor: pointer; color: #d63384; font-weight: bold; font-size: 12px; background: #ffe4ef; padding: 4px 8px; border-radius: 6px; }
        
        button { background: #d63384; color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; width: 95%; font-weight: bold; margin-top: 15px; font-size: 16px; transition: 0.3s; }
        button:hover { background: #b02a6b; transform: translateY(-2px); }
        
        .switch-link { color: #d63384; text-decoration: underline; cursor: pointer; margin-top: 20px; display: inline-block; font-size: 14px; }
        
        #gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        img { width: 100%; height: 160px; object-fit: cover; border-radius: 18px; border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        
        .hidden { display: none; }
        #status { margin-top: 15px; font-weight: bold; color: #d63384; }
        #user-tag { background: #ffe4ef; color: #d63384; padding: 5px 12px; border-radius: 20px; display: inline-block; font-size: 12px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="box" id="auth-box">
    <h1 id="auth-title">🔒 Register Vault</h1>
    <p id="auth-sub">Apne partner ke liye ek naya account banayein</p>
    
    <div class="input-group">
        <input type="text" id="phone" placeholder="Mobile Number">
    </div>
    
    <div class="input-group">
        <input type="password" id="pass" placeholder="Secret Password">
        <span class="toggle-btn" onclick="viewPassword()">SHOW</span>
    </div>

    <button id="action-btn" onclick="handleAuth()">Create Account</button>
    <div class="switch-link" id="toggle-link" onclick="toggleView()">Already have an account? Login</div>
</div>

<div class="box hidden" id="app-box">
    <h1>📸 My Memories</h1>
    <div id="user-tag"></div>
    
    <input type="file" id="fileInput" accept="image/*" style="margin-bottom: 10px;">
    <button onclick="uploadImage()">Upload to Cloud ✨</button>
    
    <div id="status"></div>
    <hr style="border: 0; border-top: 1.5px solid #fff0f5; margin: 30px 0;">
    
    <div id="gallery"></div>
    <button onclick="location.reload()" style="background:#888; width: auto; padding: 8px 20px; font-size: 12px;">Logout</button>
</div>

<script>
    // --- FIREBASE CONFIGURATION ---
    const firebaseConfig = {
        apiKey: "AIzaSyA7fMm1LjMOz4BefGk60cmMuSoFzBvJapg",
        authDomain: "ultimatememories-64a97.firebaseapp.com",
        projectId: "ultimatememories-64a97",
        databaseURL: "https://ultimatememories-64a97-default-rtdb.firebaseio.com",
        appId: "1:513888704426:web:b1476d30698d45dd117dd3"
    };

    // --- IMGBB API KEY ---
    const IMGBB_KEY = "cb53c38c41a5ce7d642d1152d306da9a"; 

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let isLogin = false;
    let loggedUser = null;

    // Show/Hide Password Toggle
    function viewPassword() {
        const p = document.getElementById('pass');
        const btn = document.querySelector('.toggle-btn');
        if (p.type === "password") {
            p.type = "text";
            btn.innerText = "HIDE";
        } else {
            p.type = "password";
            btn.innerText = "SHOW";
        }
    }

    // Toggle between Login and Register
    function toggleView() {
        isLogin = !isLogin;
        document.getElementById('auth-title').innerText = isLogin ? "🔑 Login Vault" : "🔒 Register Vault";
        document.getElementById('auth-sub').innerText = isLogin ? "Apne details dalkar login karein" : "Apne partner ke liye ek naya account banayein";
        document.getElementById('action-btn').innerText = isLogin ? "Login Now" : "Create Account";
        document.getElementById('toggle-link').innerText = isLogin ? "New user? Register here" : "Already have an account? Login";
    }

    // Handle Authentication
    function handleAuth() {
        const phone = document.getElementById('phone').value.trim();
        const pass = document.getElementById('pass').value.trim();

        if (!phone || !pass) return alert("Please fill all details!");

        if (isLogin) {
            // Login Logic
            database.ref('users/' + phone).once('value', (snapshot) => {
                if (snapshot.exists() && snapshot.val().password === pass) {
                    openVault(phone);
                } else {
                    alert("Invalid phone or password! ❌");
                }
            });
        } else {
            // Register Logic
            database.ref('users/' + phone).set({ password: pass }).then(() => {
                alert("Account Created! Now click Login to enter. ✅");
                toggleView();
            }).catch(e => alert("Error! Database rules check karein."));
        }
    }

    // Open User Vault
    function openVault(userId) {
        loggedUser = userId;
        document.getElementById('auth-box').classList.add('hidden');
        document.getElementById('app-box').classList.remove('hidden');
        document.getElementById('user-tag').innerText = "Logged in: " + userId;
        loadUserPhotos();
    }

    // Upload Image to ImgBB and save URL to Firebase
    async function uploadImage() {
        const fileInput = document.getElementById('fileInput');
        const file = fileInput.files[0];
        const status = document.getElementById('status');

        if (!file) return alert("Please select a photo first!");

        status.innerText = "Uploading to Cloud... ⏳";
        const formData = new FormData();
        formData.append("image", file);

        try {
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                method: "POST",
                body: formData
            });
            const result = await response.json();
            const photoUrl = result.data.url;

            // Save to Firebase under specific user's folder
            database.ref('photos/' + loggedUser).push(photoUrl);
            status.innerText = "Memory Saved! ✅";
            fileInput.value = "";
        } catch (error) {
            alert("Upload failed! Check internet connection.");
            status.innerText = "";
        }
    }

    // Load photos from Firebase
    function loadUserPhotos() {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = ""; // Clear current view
        database.ref('photos/' + loggedUser).on('child_added', (snapshot) => {
            const img = document.createElement('img');
            img.src = snapshot.val();
            gallery.prepend(img);
        });
    }
</script>
</body>
</html>
