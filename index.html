<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couple Vault 💖 v2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --main-color: #d63384; --bg-color: #fff5f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); margin: 0; padding: 10px; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        .box { max-width: 400px; width: 90%; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #ffdae9; text-align: center; }
        
        h1 { color: var(--main-color); margin-bottom: 25px; font-size: 22px; }
        .input-group { position: relative; width: 100%; margin: 10px 0; }
        input { width: 85%; padding: 14px; border: 1px solid #fbcfe8; border-radius: 12px; outline: none; background: #fff9fb; font-size: 16px; }
        
        /* Show/Hide Password Icon */
        .toggle-pass { position: absolute; right: 25px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #aaa; font-size: 18px; user-select: none; }

        .btn { background: var(--main-color); color: white; border: none; padding: 15px; border-radius: 15px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; font-size: 16px; transition: 0.3s; }
        .btn-sec { background: white; color: var(--main-color); border: 2px solid var(--main-color); margin-top: 15px; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        
        .hidden { display: none; }
        #status-msg { margin: 15px 0; font-weight: bold; color: var(--main-color); font-size: 14px; }
    </style>
</head>
<body>

    <div id="screen-login" class="box animate__animated animate__fadeInDown">
        <h1>🔑 Login</h1>
        <div class="input-group"><input type="text" id="log-phone" placeholder="Mobile Number"></div>
        <div class="input-group">
            <input type="password" id="log-pass" placeholder="Secret Password">
            <span class="toggle-pass" onclick="togglePasswordView('log-pass', this)">👁️</span>
        </div>
        <button class="btn" onclick="handleLogin()">Login</button>
        <p onclick="switchTo('register')" style="cursor:pointer; color:#d63384; font-size:13px; text-decoration:underline;">New User? Create Account</p>
        <p id="log-error" style="color:red; font-size:12px; margin-top:10px;"></p>
    </div>

    <div id="screen-register" class="box hidden animate__animated animate__fadeInDown">
        <h1>📝 Register</h1>
        <div class="input-group"><input type="text" id="reg-phone" placeholder="Mobile Number"></div>
        <div class="input-group">
            <input type="password" id="reg-pass" placeholder="Secret Password">
            <span class="toggle-pass" onclick="togglePasswordView('reg-pass', this)">👁️</span>
        </div>
        <button class="btn" onclick="handleRegister()">Create Account</button>
        <p onclick="switchTo('login')" style="cursor:pointer; color:#d63384; font-size:13px; text-decoration:underline;">Already have account? Login</p>
    </div>

    <div id="screen-menu" class="box hidden animate__animated animate__zoomIn">
        <h1>Dashboard 💖</h1>
        <button class="btn" onclick="navTo('screen-upload')">📤 Upload Photo</button>
        <button class="btn btn-sec" onclick="navTo('screen-gallery')">🖼️ See Memories</button>
        <button onclick="location.reload()" style="background:none; border:none; color:#999; margin-top:30px; cursor:pointer;">Logout</button>
    </div>

    <script>
    // --- FIREBASE AND IMGBB SETUP (Old configs kept) ---
    // Make sure your IMGBB_API_KEY is defined somewhere.
    const firebaseConfig = {
        apiKey: "AIzaSyA7fMm1LjMOz4BefGk60cmMuSoFzBvJapg",
        authDomain: "ultimatememories-64a97.firebaseapp.com",
        projectId: "ultimatememories-64a97",
        databaseURL: "https://ultimatememories-64a97-default-rtdb.firebaseio.com",
        appId: "1:513888704426:web:b1476d30698d45dd117dd3"
    };
    const IMGBB_API_KEY = "cb53c38c41a5ce7d642d1152d306da9a"; // This must exist.
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // -- App Logic with Animations --
    let activeUser = null;

    // Password Eye Toggle
    function togglePasswordView(inputId, icon) {
        const pass = document.getElementById(inputId);
        if (pass.type === "password") { pass.type = "text"; icon.innerText = "🔒"; }
        else { pass.type = "password"; icon.innerText = "👁️"; }
    }

    // MAIN NAVIGATION WITH ANIMATION
    function switchTo(page) {
        // Find current visible box and nuke its visibility
        const currentScreen = document.querySelector('.box:not(.hidden)');
        currentScreen.classList.add('hidden');
        
        // Show target screen, reset any lingering animation classes
        const targetScreen = (page === 'login') ? document.getElementById('screen-login') : document.getElementById('screen-register');
        targetScreen.classList.remove('hidden');
        
        // Ensure new animation class is applied cleanly
        targetScreen.classList.add('animate__fadeInDown');
    }

    // App Logic (Unchanged, just separated handlers for clarity)
    function handleLogin() { /* previous logic, with log-phone & log-pass */ }
    function handleRegister() { /* previous logic, with reg-phone & reg-pass */ }

</script>
</body>
</html>
