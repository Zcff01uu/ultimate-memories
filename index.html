<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memories Social 💖</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --main: #0095f6; --pink: #d63384; --bg: #fafafa; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 450px; background: white; min-height: 100vh; position: relative; box-shadow: 0 0 15px rgba(0,0,0,0.05); }

        /* Auth Screens */
        .auth-box { padding: 40px; text-align: center; display: flex; flex-direction: column; height: 100vh; justify-content: center; box-sizing: border-box; }
        .logo { font-family: 'Brush Script MT', cursive; font-size: 50px; margin-bottom: 25px; color: #262626; }
        input { width: 100%; padding: 12px; border: 1px solid #dbdbdb; border-radius: 8px; background: #fafafa; margin-bottom: 12px; box-sizing: border-box; font-size: 14px; }
        .btn-main { background: var(--main); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .link { color: var(--main); font-weight: 600; cursor: pointer; margin-top: 20px; font-size: 14px; }

        /* Main App Layout */
        #main-app { display: none; flex-direction: column; height: 100vh; }
        header { padding: 15px; border-bottom: 1px solid #dbdbdb; display: flex; justify-content: space-between; align-items: center; background: white; }
        .content { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .view { display: none; padding: 15px; }
        .active-view { display: block; }

        /* Search Results Card */
        .user-card { border: 1px solid #dbdbdb; padding: 12px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; margin-top: 15px; background: white; }
        .avatar { width: 44px; height: 44px; background: #efefef; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* Navigation */
        nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: white; border-top: 1px solid #dbdbdb; display: flex; justify-content: space-around; padding: 12px 0; }
        .nav-icon { font-size: 24px; cursor: pointer; color: #262626; transition: 0.2s; }
        .nav-icon:active { transform: scale(0.8); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="page-login" class="auth-box animate__animated animate__fadeIn">
        <div class="logo">Memories</div>
        <input type="text" id="login-user" placeholder="Username">
        <input type="password" id="login-pass" placeholder="Password">
        <button class="btn-main" onclick="handleLogin()">Log In</button>
        <p class="link" onclick="showAuthPage('register')">Don't have an account? Sign Up</p>
    </div>

    <div id="page-register" class="auth-box hidden animate__animated animate__fadeInRight">
        <div class="logo">Join Memories</div>
        <p style="color:#8e8e8e; font-size:14px; margin-top:-20px; margin-bottom:20px;">Create an account to share memories with your partner.</p>
        <input type="text" id="reg-user" placeholder="Choose Username">
        <input type="password" id="reg-pass" placeholder="Create Password">
        <button class="btn-main" style="background:var(--pink)" onclick="handleRegister()">Register Now</button>
        <p class="link" onclick="showAuthPage('login')">Already have an account? Log In</p>
    </div>

    <div id="main-app">
        <header><b>Memories</b> <span onclick="location.reload()" style="color:#ed4956; font-size:12px; cursor:pointer;">Logout</span></header>
        
        <div class="content">
            <div id="v-home" class="view active-view">
                <div id="chat-msgs" style="display:flex; flex-direction:column; gap:10px;"></div>
                <div id="chat-input-bar" class="hidden" style="position:fixed; bottom:65px; width:100%; max-width:430px; padding:10px; display:flex; gap:5px; background:white;">
                    <input type="text" id="msgText" placeholder="Message..." style="margin:0; border-radius:20px;">
                    <button onclick="sendMsg()" style="border:none; color:var(--main); background:none; font-weight:bold;">Send</button>
                </div>
            </div>

            <div id="v-search" class="view">
                <div style="display:flex; gap:5px;">
                    <input type="text" id="searchIn" placeholder="Type username..." style="margin:0;">
                    <button class="btn-main" style="width:80px;" onclick="searchUser()">Search</button>
                </div>
                <div id="search-output"></div>
                <div id="notif-box" style="margin-top:30px;">
                    <h4 style="border-bottom:1px solid #eee; padding-bottom:10px;">Pending Requests</h4>
                </div>
            </div>

            <div id="v-profile" class="view">
                <div style="text-align:center; padding:20px;">
                    <div style="width:80px; height:80px; background:#ddd; border-radius:50%; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; font-size:30px;">👤</div>
                    <h3 id="display-u">Username</h3>
                    <input type="file" id="imgFile" style="font-size:12px;">
                    <button class="btn-main" onclick="upload()">Post Memory</button>
                </div>
                <div id="gallery-grid" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:2px;"></div>
            </div>
        </div>

        <nav>
            <div class="nav-icon" onclick="changeTab('home')">🏠</div>
            <div class="nav-icon" onclick="changeTab('search')">🔍</div>
            <div class="nav-icon" onclick="changeTab('profile')">👤</div>
        </nav>
    </div>
</div>

<script>
    // Config
    const firebaseConfig = {
        apiKey: "AIzaSyA7fMm1LjMOz4BefGk60cmMuSoFzBvJapg",
        databaseURL: "https://ultimatememories-64a97-default-rtdb.firebaseio.com",
        projectId: "ultimatememories-64a97",
        appId: "1:513888704426:web:b1476d30698d45dd117dd3",
        authDomain: "ultimatememories-64a97.firebaseapp.com"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let curU = "", curId = "", partnerId = "";

    function showAuthPage(p) {
        document.getElementById('page-login').classList.add('hidden');
        document.getElementById('page-register').classList.add('hidden');
        document.getElementById('page-' + p).classList.remove('hidden');
    }

    function handleRegister() {
        let u = document.getElementById('reg-user').value.toLowerCase().trim();
        let p = document.getElementById('reg-pass').value;
        if(u.length < 3) return alert("Username too short!");
        
        // Background email creation
        auth.createUserWithEmailAndPassword(u + "@memories.com", p).then(res => {
            db.ref('users/' + u).set(res.user.uid);
            alert("Account Created! Please Login.");
            showAuthPage('login');
        }).catch(err => alert(err.message));
    }

    function handleLogin() {
        curU = document.getElementById('login-user').value.toLowerCase().trim();
        let p = document.getElementById('login-pass').value;
        auth.signInWithEmailAndPassword(curU + "@memories.com", p).then(res => {
            curId = res.user.uid;
            document.getElementById('display-u').innerText = curU;
            startApp();
        }).catch(() => alert("Wrong username or password!"));
    }

    function startApp() {
        document.getElementById('page-login').classList.add('hidden');
        document.getElementById('main-app').style.display = 'flex';
        
        // Watch for partner
        db.ref('partners/' + curId).on('value', s => {
            if(s.exists()){
                partnerId = s.val().sId;
                document.getElementById('chat-input-bar').classList.remove('hidden');
                loadData();
            }
        });

        // Watch for requests
        db.ref('requests/' + curId).on('value', s => {
            let box = document.getElementById('notif-box');
            box.innerHTML = "<h4>Pending Requests</h4>";
            s.forEach(child => {
                box.innerHTML += `<div class="user-card">
                    <b>${child.key}</b>
                    <button class="btn-main" style="width:80px; padding:5px;" onclick="acceptReq('${child.key}','${child.val()}')">Accept</button>
                </div>`;
            });
        });
    }

    function searchUser() {
        let target = document.getElementById('searchIn').value.toLowerCase().trim();
        let out = document.getElementById('search-output');
        out.innerHTML = "";

        if(target === curU) return alert("You cannot search yourself!");

        db.ref('users/' + target).once('value', s => {
            if(s.exists()) {
                out.innerHTML = `<div class="user-card animate__animated animate__fadeInUp">
                    <div class="avatar">👤</div>
                    <div style="flex:1; margin-left:10px;"><b>${target}</b></div>
                    <button class="btn-main" style="width:100px; font-size:12px;" onclick="sendReq('${target}','${s.val()}')">Send Request</button>
                </div>`;
            } else {
                out.innerHTML = `<p style="color:red; text-align:center; font-size:13px; margin-top:10px;">User not found!</p>`;
            }
        });
    }

    function sendReq(name, id) {
        db.ref('requests/' + id + '/' + curU).set(curId);
        alert("Request Sent to " + name);
    }

    function acceptReq(name, id) {
        let pair = curId < id ? curId + id : id + curId;
        db.ref('partners/' + curId).set({ name: name, sId: pair });
        db.ref('partners/' + id).set({ name: curU, sId: pair });
        db.ref('requests/' + curId + '/' + name).remove();
    }

    function changeTab(t) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
        document.getElementById('v-' + t).classList.add('active-view');
    }

    function loadData() {
        db.ref('chats/' + partnerId).on('value', s => {
            let box = document.getElementById('chat-msgs'); box.innerHTML = "";
            s.forEach(m => {
                let d = m.val();
                let style = d.u === curU ? "align-self:flex-end; background:var(--main); color:white;" : "align-self:flex-start; background:#efefef;";
                box.innerHTML += `<div style="${style} padding:8px 15px; border-radius:18px; max-width:70%; font-size:14px;">${d.t}</div>`;
            });
        });
        db.ref('pics/' + partnerId).on('value', s => {
            let g = document.getElementById('gallery-grid'); g.innerHTML = "";
            s.forEach(p => g.innerHTML += `<img src="${p.val()}" style="width:100%; aspect-ratio:1/1; object-fit:cover;">`);
        });
    }

    function sendMsg() {
        let t = document.getElementById('msgText').value;
        if(t && partnerId) db.ref('chats/' + partnerId).push({ u: curU, t: t });
        document.getElementById('msgText').value = "";
    }

    async function upload() {
        let f = document.getElementById('imgFile').files[0];
        if(!f || !partnerId) return alert("Select photo & ensure partner is added!");
        let fd = new FormData(); fd.append("image", f);
        let res = await fetch("https://api.imgbb.com/1/upload?key=cb53c38c41a5ce7d642d1152d306da9a", {method:"POST", body:fd});
        let d = await res.json();
        db.ref('pics/' + partnerId).push(d.data.url);
        alert("Memory Saved!");
    }
</script>
</body>
</html>
