<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memories Social 💖</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --main-color: #d63384; --insta-blue: #0095f6; --bg: #fafafa; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 450px; background: white; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 10px rgba(0,0,0,0.1); }

        /* Login Screen */
        #screen-auth { padding: 40px; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; box-sizing: border-box; }
        .logo { font-family: 'Brush Script MT', cursive; font-size: 45px; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; border: 1px solid #dbdbdb; border-radius: 5px; background: #fafafa; margin-bottom: 10px; box-sizing: border-box; }
        .btn-blue { background: var(--insta-blue); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }

        /* App Screens */
        #screen-main { display: none; flex-direction: column; height: 100vh; }
        header { padding: 15px; border-bottom: 1px solid #dbdbdb; display: flex; justify-content: space-between; align-items: center; background: white; }
        .content { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .page { display: none; padding: 15px; }
        .active-page { display: block; }

        /* Chat */
        #msg-box { display: flex; flex-direction: column; gap: 8px; padding: 10px; }
        .m { padding: 10px 15px; border-radius: 20px; max-width: 75%; font-size: 14px; }
        .s { background: var(--insta-blue); color: white; align-self: flex-end; }
        .r { background: #efefef; color: black; align-self: flex-start; }

        /* Bottom Nav */
        .nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: white; border-top: 1px solid #dbdbdb; display: flex; justify-content: space-around; padding: 15px 0; }
        .nav-i { font-size: 24px; cursor: pointer; color: #262626; position: relative; }
        .dot { position: absolute; top: -2px; right: -2px; width: 10px; height: 10px; background: red; border-radius: 50%; display: none; }

        /* Profile Card */
        .p-card { text-align: center; padding: 20px; }
        .p-avatar { width: 80px; height: 80px; background: #eee; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 30px; border: 2px solid var(--main-color); }
    </style>
</head>
<body>

<div class="app">
    <div id="screen-auth" class="animate__animated animate__fadeIn">
        <div class="logo">Memories</div>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn-blue" onclick="authMe()">Log In</button>
        <p onclick="isReg=true; authMe()" style="color:var(--insta-blue); cursor:pointer; font-size:14px; margin-top:15px;">Create New Account</p>
    </div>

    <div id="screen-main">
        <header><b id="head-title">Memories</b> <span onclick="location.reload()" style="color:red; font-size:12px;">Logout</span></header>
        
        <div class="content">
            <div id="p-home" class="page active-page">
                <div id="msg-box"></div>
                <div style="position:fixed; bottom:70px; width:100%; max-width:430px; display:flex; padding:10px; background:white; gap:5px;">
                    <input type="text" id="mIn" placeholder="Message..." style="margin:0; border-radius:20px;">
                    <button onclick="send()" style="border:none; color:var(--insta-blue); background:none; font-weight:bold;">Send</button>
                </div>
            </div>

            <div id="p-search" class="page">
                <input type="text" id="sUser" placeholder="Search username...">
                <button class="btn-blue" onclick="req()">Send Request</button>
                <div id="notif-area" style="margin-top:20px;"></div>
            </div>

            <div id="p-add" class="page" style="text-align:center;">
                <h3>Upload Photo</h3>
                <input type="file" id="f">
                <button class="btn-blue" onclick="up()">Post to Gallery</button>
            </div>

            <div id="p-profile" class="page">
                <div class="p-card">
                    <div class="p-avatar">👤</div>
                    <h2 id="my-name-display">Username</h2>
                    <p style="color:#8e8e8e">Memories Member</p>
                </div>
                <hr style="border:0; border-top:1px solid #dbdbdb">
                <div id="gal" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:2px;"></div>
            </div>
        </div>

        <div class="nav">
            <div class="nav-i" onclick="tab('home')">🏠</div>
            <div class="nav-i" onclick="tab('search')">🔍<div id="notif-dot" class="dot"></div></div>
            <div class="nav-i" onclick="tab('add')">➕</div>
            <div class="nav-i" onclick="tab('profile')">👤</div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA7fMm1LjMOz4BefGk60cmMuSoFzBvJapg",
        databaseURL: "https://ultimatememories-64a97-default-rtdb.firebaseio.com",
        projectId: "ultimatememories-64a97",
        appId: "1:513888704426:web:b1476d30698d45dd117dd3",
        authDomain: "ultimatememories-64a97.firebaseapp.com"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();
    let isReg = false, myU = "", myId = "", sId = "";

    function authMe() {
        myU = document.getElementById('user').value.toLowerCase().trim();
        let p = document.getElementById('pass').value;
        if(!myU || !p) return alert("Fill details!");
        let e = myU + "@m.com";
        if(isReg) {
            auth.createUserWithEmailAndPassword(e, p).then(u => {
                db.ref('users/'+myU).set(u.user.uid);
                alert("Account Created! Login now."); location.reload();
            }).catch(err => alert(err.message));
        } else {
            auth.signInWithEmailAndPassword(e, p).then(u => {
                myId = u.user.uid; 
                document.getElementById('my-name-display').innerText = myU;
                go();
            }).catch(() => alert("Wrong credentials!"));
        }
    }

    function go() {
        document.getElementById('screen-auth').style.display = 'none';
        document.getElementById('screen-main').style.display = 'flex';
        
        // Listen Notifications
        db.ref('requests/'+myId).on('value', snap => {
            let area = document.getElementById('notif-area');
            area.innerHTML = "<h4>Notifications</h4>";
            if(snap.exists()) document.getElementById('notif-dot').style.display = 'block';
            snap.forEach(c => {
                area.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; background:#fafafa; border:1px solid #eee; margin-bottom:5px;">
                    <span><b>${c.key}</b> wants to connect</span>
                    <button onclick="accept('${c.key}','${c.val()}')" style="background:var(--insta-blue); color:white; border:none; padding:5px; border-radius:4px;">Accept</button>
                </div>`;
            });
        });

        db.ref('partners/'+myId).on('value', snap => {
            if(snap.exists()) {
                sId = snap.val().sId;
                sync();
            }
        });
    }

    function tab(t) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById('p-'+t).classList.add('active-page');
        document.getElementById('head-title').innerText = t === 'home' ? 'Memories' : t.toUpperCase();
        if(t === 'search') document.getElementById('notif-dot').style.display = 'none';
    }

    function req() {
        let t = document.getElementById('sUser').value.toLowerCase();
        db.ref('users/'+t).once('value', s => {
            if(s.exists()) {
                db.ref('requests/'+s.val()+'/'+myU).set(myId);
                alert("Request Sent!");
            } else alert("User not found!");
        });
    }

    function accept(name, id) {
        let pair = myId < id ? myId+id : id+myId;
        db.ref('partners/'+myId).set({name: name, sId: pair});
        db.ref('partners/'+id).set({name: myU, sId: pair});
        db.ref('requests/'+myId+'/'+name).remove();
    }

    function sync() {
        db.ref('chats/'+sId).on('value', s => {
            let b = document.getElementById('msg-box'); b.innerHTML = "";
            s.forEach(m => {
                let d = m.val();
                b.innerHTML += `<div class="m ${d.u===myU?'s':'r'}">${d.t}</div>`;
            });
            b.scrollTop = b.scrollHeight;
        });
        db.ref('pics/'+sId).on('value', s => {
            let g = document.getElementById('gal'); g.innerHTML = "";
            s.forEach(p => g.innerHTML += `<img src="${p.val()}" style="width:100%; aspect-ratio:1/1; object-fit:cover;">`);
        });
    }

    function send() {
        let t = document.getElementById('mIn').value;
        if(t && sId) db.ref('chats/'+sId).push({u:myU, t:t});
        document.getElementById('mIn').value = "";
    }

    async function up() {
        let f = document.getElementById('f').files[0];
        if(!f || !sId) return alert("Add a partner first!");
        let fd = new FormData(); fd.append("image", f);
        let r = await fetch("https://api.imgbb.com/1/upload?key=cb53c38c41a5ce7d642d1152d306da9a", {method:"POST", body:fd});
        let d = await r.json();
        db.ref('pics/'+sId).push(d.data.url);
        alert("Posted!"); tab('profile');
    }
</script>
</body>
</html>
