<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Memories 💖</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --main-color: #d63384; --bg-color: #fff5f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); margin: 0; padding: 10px; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .box { width: 95%; max-width: 380px; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: var(--main-color); margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1.5px solid #fbcfe8; border-radius: 12px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn { background: var(--main-color); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .hidden { display: none !important; }
        #gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px; }
        .img-card { width: 100%; height: 140px; border-radius: 10px; object-fit: cover; }
    </style>
</head>
<body>

    <div id="screen-auth" class="box animate__animated animate__fadeIn">
        <h1 id="auth-title">🔑 Login</h1>
        <input type="email" id="email" placeholder="Email (Example: ourlove@gmail.com)">
        <input type="password" id="pass" placeholder="Secret Password">
        <button class="btn" id="main-btn" onclick="handleAuth()">Login</button>
        <p id="toggle-text" onclick="toggleMode()" style="cursor:pointer; color:var(--main-color); margin-top:15px; font-size:14px;">New User? Create Account</p>
    </div>

    <div id="screen-dashboard" class="box hidden animate__animated animate__zoomIn" style="max-width: 500px;">
        <h1>Our Memories 💖</h1>
        <input type="file" id="filePicker" accept="image/*">
        <button class="btn" onclick="uploadImg()" id="up-btn">Upload Photo ✨</button>
        <div id="gallery"></div>
        <button onclick="location.reload()" style="background:none; border:none; color:#aaa; margin-top:20px; cursor:pointer;">Logout</button>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA7fMm1LjMOz4BefGk60cmMuSoFzBvJapg",
        databaseURL: "https://ultimatememories-64a97-default-rtdb.firebaseio.com",
        projectId: "ultimatememories-64a97",
        appId: "1:513888704426:web:b1476d30698d45dd117dd3",
        authDomain: "ultimatememories-64a97.firebaseapp.com"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    let isLogin = true;

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('auth-title').innerText = isLogin ? "🔑 Login" : "📝 Register";
        document.getElementById('main-btn').innerText = isLogin ? "Login" : "Register";
        document.getElementById('toggle-text').innerText = isLogin ? "New User? Create Account" : "Already have account? Login";
    }

    function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;

        if(isLogin) {
            auth.signInWithEmailAndPassword(email, pass)
                .then(user => showDashboard(user.user.uid))
                .catch(err => alert(err.message));
        } else {
            auth.createUserWithEmailAndPassword(email, pass)
                .then(user => showDashboard(user.user.uid))
                .catch(err => alert(err.message));
        }
    }

    function showDashboard(uid) {
        document.getElementById('screen-auth').classList.add('hidden');
        document.getElementById('screen-dashboard').classList.remove('hidden');
        loadPhotos(uid);
        window.currentUid = uid;
    }

    async function uploadImg() {
        const file = document.getElementById('filePicker').files[0];
        if(!file) return alert("Select photo!");
        const btn = document.getElementById('up-btn');
        btn.innerText = "Uploading...";
        
        const fd = new FormData(); fd.append("image", file);
        const res = await fetch("https://api.imgbb.com/1/upload?key=cb53c38c41a5ce7d642d1152d306da9a", {method:"POST", body:fd});
        const data = await res.json();
        
        db.ref('memories/' + window.currentUid).push(data.data.url);
        btn.innerText = "Upload Photo ✨";
        alert("Saved! ✅");
    }

    function loadPhotos(uid) {
        const gal = document.getElementById('gallery');
        db.ref('memories/' + uid).on('value', snap => {
            gal.innerHTML = "";
            snap.forEach(child => {
                const img = document.createElement('img');
                img.src = child.val(); img.className = "img-card animate__animated animate__fadeIn";
                gal.prepend(img);
            });
        });
    }
</script>
</body>
</html>
