<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Memories</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #6c5ce7; --secondary: #a29bfe; --bg: #f9f9f9; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        
        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .card { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 380px; animation: fadeIn 0.8s ease-out; position: relative; }
        h2 { color: #2d3436; margin-bottom: 0.5rem; }
        p { color: #636e72; font-size: 0.9rem; margin-bottom: 1.5rem; }
        
        .input-group { position: relative; margin-bottom: 15px; }
        input { width: 100%; padding: 12px 15px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; outline: none; transition: 0.3s; font-size: 1rem; }
        input:focus { border-color: var(--primary); }
        
        .eye-icon { position: absolute; right: 15px; top: 14px; cursor: pointer; color: #b2bec3; }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 1rem; transition: 0.3s; margin-top: 10px; }
        .btn-main { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3); }
        .btn-main:hover { background: #5b4cc4; transform: translateY(-2px); }
        
        .toggle-text { margin-top: 20px; font-size: 0.85rem; color: #636e72; }
        .toggle-text span { color: var(--primary); cursor: pointer; font-weight: bold; }
        
        /* Hide sections initially */
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="login-page" class="card">
    <h2>Welcome Back!</h2>
    <p>Sofia, please login to your memories.</p>
    <div class="input-group">
        <input type="email" id="login-email" placeholder="Email Address">
    </div>
    <div class="input-group">
        <input type="password" id="login-pass" placeholder="Password">
        <i class="fas fa-eye eye-icon" onclick="togglePass('login-pass')"></i>
    </div>
    <button class="btn-main" id="btnLogin">Login</button>
    <div class="toggle-text">
        Don't have an account? <span onclick="showPage('signup-page')">Sign Up</span><br><br>
        <span onclick="showPage('reset-page')">Forgot Password?</span>
    </div>
</div>

<div id="signup-page" class="card hidden">
    <h2>Create Account</h2>
    <p>Join Ultimate Memories today.</p>
    <div class="input-group">
        <input type="email" id="signup-email" placeholder="Email Address">
    </div>
    <div class="input-group">
        <input type="password" id="signup-pass" placeholder="Password">
        <i class="fas fa-eye eye-icon" onclick="togglePass('signup-pass')"></i>
    </div>
    <button class="btn-main" id="btnSignup" style="background: #00b894;">Create Account</button>
    <div class="toggle-text">
        Already have an account? <span onclick="showPage('login-page')">Login</span>
    </div>
</div>

<div id="reset-page" class="card hidden">
    <h2>Reset Password</h2>
    <p>Enter email to get reset link.</p>
    <div class="input-group">
        <input type="email" id="reset-email" placeholder="Registered Email">
    </div>
    <button class="btn-main" id="btnReset" style="background: #0984e3;">Send Reset Link</button>
    <div class="toggle-text">
        Remembered? <span onclick="showPage('login-page')">Back to Login</span>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // QuestVerse New Config from image_86b242
    const firebaseConfig = {
        apiKey: "AIzaSyC0-_tmpcPMJCCYGlXDRewupZmGog-eC3g",
        authDomain: "questverse-a6352.firebaseapp.com",
        projectId: "questverse-a6352",
        storageBucket: "questverse-a6352.firebasestorage.app",
        messagingSenderId: "74079907074",
        appId: "1:74079907074:web:4ab6987f4389e43d64e61b",
        measurementId: "G-8YMVKW90LM"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Navigation Logic
    window.showPage = (pageId) => {
        document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
        document.getElementById(pageId).classList.remove('hidden');
    };

    // Eye Button Logic
    window.togglePass = (id) => {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
    };

    // Firebase Logic
    document.getElementById('btnSignup').addEventListener('click', () => {
        const email = document.getElementById('signup-email').value;
        const pass = document.getElementById('signup-pass').value;
        createUserWithEmailAndPassword(auth, email, pass)
            .then(() => {
                sendEmailVerification(auth.currentUser);
                alert("Sofia, Check your Gmail for verification link!");
                showPage('login-page');
            }).catch(err => alert(err.message));
    });

    document.getElementById('btnLogin').addEventListener('click', () => {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        signInWithEmailAndPassword(auth, email, pass)
            .then(() => {
                if(auth.currentUser.emailVerified) alert("Login Success!");
                else alert("Please verify your email first!");
            }).catch(err => alert(err.message));
    });

    document.getElementById('btnReset').addEventListener('click', () => {
        const email = document.getElementById('reset-email').value;
        sendPasswordResetEmail(auth, email)
            .then(() => alert("Reset link sent to " + email))
            .catch(err => alert(err.message));
    });
</script>

</body>
</html>
