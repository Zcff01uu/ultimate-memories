<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couple Vault 💖</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fff5f8; text-align: center; padding: 20px; }
        .box { max-width: 400px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1.5px solid #ffdae9; }
        h1 { color: #d63384; font-size: 24px; }
        .input-group { position: relative; margin: 10px 0; }
        input { width: 85%; padding: 12px; border: 1px solid #fbcfe8; border-radius: 10px; outline: none; background: #fff9fb; }
        .toggle-btn { position: absolute; right: 25px; top: 12px; cursor: pointer; color: #d63384; font-weight: bold; font-size: 12px; }
        button { background: #d63384; color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; width: 95%; font-weight: bold; margin-top: 15px; }
        #gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        img { width: 100%; height: 150px; object-fit: cover; border-radius: 15px; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .hidden { display: none; }
        .switch-link { color: #d63384; text-decoration: underline; cursor: pointer; margin-top: 15px; display: block; font-size: 14px; }
    </style>
</head>
<body>

<div class="box" id="auth-box">
    <h1 id="title">🔒 Register Vault</h1>
    <div class="input-group"><input type="text" id="phone" placeholder="Mobile Number"></div>
    <div class="input-group">
        <input type="password" id="pass" placeholder="Secret Password">
        <span class="toggle-btn" onclick="togglePass()">SHOW</span>
    </div>
    <button id="btn" onclick="handleAuth()">Create Account</button>
    <span class="switch-link" onclick="switchMode()">Already have an account? Login</span>
</div>

<div class="box hidden" id="app-box">
    <h1>📸 My Memories</h1>
    <p id="user-tag" style="color:#d63384; font-weight:bold;"></p>
    <input type="file" id="filePicker" accept="image/*">
    <button onclick="upload()">Upload Photo ✨</button>
    <div id="status" style="margin-top:10px; color:#d63384;"></div>
    <div id="gallery"></div>
</div>

<script>
    // Aapka Firebase Config jo image mein tha
    const firebaseConfig = {
        apiKey: "AIzaSyA7fMm1LjMOz4BefGk60cmMuSoFzBvJapg",
        authDomain: "ultimatememories-64a97.firebaseapp.com",
        projectId: "ultimatememories-64a97",
        databaseURL: "https://ultimatememories-64a97-default-rtdb.firebaseio.com",
        appId: "1:513888704426:web:b1476d30698d45dd117dd3"
    };

    const IMGBB_KEY = "cb53c38c41a5ce7d642d1152d306da9a"; 
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isLogin = false; let user = null;

    function togglePass() {
        const p = document.getElementById('pass'); p.type = p.type === "password" ? "text" : "password";
    }

    function switchMode() {
        isLogin = !isLogin;
        document.getElementById('title').innerText = isLogin ? "🔑 Login Vault" : "🔒 Register Vault";
        document.getElementById('btn').innerText = isLogin ? "Login Now" : "Create Account";
    }

    function handleAuth() {
        const ph = document.getElementById('phone').value; const ps = document.getElementById('pass').value;
        if(!ph || !ps) return alert("Details bharo!");

        if(isLogin) {
            db.ref('users/'+ph).once('value', s => {
                if(s.exists() && s.val().password === ps) { startApp(ph); } 
                else { alert("Galat details!"); }
            });
        } else {
            db.ref('users/'+ph).set({password: ps}).then(() => { 
                alert("Account ban gaya! Ab Login mode par switch karke andar jayein."); 
                switchMode(); 
            });
        }
    }

    function startApp(id) {
        user = id; 
        document.getElementById('auth-box').classList.add('hidden');
        document.getElementById('app-box').classList.remove('hidden');
        document.getElementById('user-tag').innerText = "Logged in as: " + id;
        loadPhotos();
    }

    async function upload() {
        const file = document.getElementById('filePicker').files[0]; if(!file) return alert("Photo chuno!");
        document.getElementById('status').innerText = "Saving your memory... ⏳";
        const fd = new FormData(); fd.append("image", file);
        try {
            const res = await fetch("https://api.imgbb.com/1/upload?key="+IMGBB_KEY, {method:"POST", body:fd});
            const data = await res.json();
            db.ref('pics/'+user).push(data.data.url);
            document.getElementById('status').innerText = "Saved Successfully! ✅";
        } catch(e) { alert("Upload fail ho gaya!"); }
    }

    function loadPhotos() {
        db.ref('pics/'+user).on('child_added', s => {
            const img = document.createElement('img'); img.src = s.val();
            document.getElementById('gallery').prepend(img);
        });
    }
</script>
</body>
</html>
