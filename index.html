<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memories Social 💖</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --accent: #d63384; --bg: #fff5f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        .logo-text { font-family: 'Brush Script MT', cursive; font-size: 32px; color: var(--accent); margin: 0; }
        header { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: white; }
        
        /* Inbox & Dots */
        .inbox-item { padding: 15px; border-bottom: 1px solid #f9f9f9; display: flex; align-items: center; cursor: pointer; position: relative; user-select: none; }
        .avatar { width: 45px; height: 45px; background: #ffd1dc; border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .msg-dot { width: 10px; height: 10px; background: #ff3b7b; border-radius: 50%; position: absolute; right: 20px; display: none; }
        .has-new-msg .msg-dot { display: block; }
        .muted { opacity: 0.6; }

        /* Heart Notification */
        .heart-container { position: relative; cursor: pointer; }
        .heart-dot { position: absolute; top: -5px; right: -5px; width: 10px; height: 10px; background: red; border-radius: 50%; border: 2px solid white; display: none; }

        /* Context Menu (Delete/Mute) */
        #context-menu { position: fixed; background: white; box-shadow: 0 0 15px rgba(0,0,0,0.2); border-radius: 10px; display: none; z-index: 2000; width: 150px; }
        .menu-item { padding: 12px; cursor: pointer; font-size: 14px; border-bottom: 1px solid #eee; }
        .menu-item:last-child { border: none; color: red; }

        /* General UI */
        .input-field { width: 90%; padding: 12px; border: 1px solid #ffc1e3; border-radius: 10px; background: #fdf2f7; outline: none; margin-bottom: 10px; }
        .btn-primary { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .view { padding: 15px; padding-bottom: 80px; }
        nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; padding: 12px 0; }
        .nav-icon { font-size: 22px; cursor: pointer; color: #ccc; }
        .nav-icon.active { color: var(--accent); }
        
        #chat-screen { position: fixed; top: 0; width: 100%; max-width: 450px; height: 100%; background: white; z-index: 1000; display: none; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #fffafa; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 70%; font-size: 14px; }
        .sent { align-self: flex-end; background: var(--accent); color: white; }
        .received { align-self: flex-start; background: #efefef; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-auth" class="view" style="text-align:center; padding-top:100px;">
        <div class="logo-text" style="font-size:48px;">Memories</div><br>
        <input type="text" id="email" class="input-field" placeholder="Username">
        <input type="password" id="pass" class="input-field" placeholder="Password">
        <button class="btn-primary" onclick="authProcess(true)">Log In</button>
        <p onclick="authProcess(false)" style="color:var(--accent); cursor:pointer;">Create Account</p>
    </div>

    <div id="screen-app" class="hidden">
        <header>
            <div class="logo-text">Memories</div>
            <div class="heart-container" onclick="tab('search')">
                ❤️ <div id="heart-dot" class="heart-dot"></div>
            </div>
        </header>

        <div id="view-home" class="view">
            <h4>Messages</h4>
            <div id="inbox-list"></div>
        </div>

        <div id="view-search" class="view hidden">
            <input type="text" id="search-user" class="input-field" placeholder="Search username...">
            <button class="btn-primary" onclick="findUser()">Search</button>
            <div id="search-res" style="margin: 20px 0;"></div>
            <hr>
            <h4>Friend Requests</h4>
            <div id="req-list"></div>
        </div>

        <div id="view-profile" class="view hidden" style="text-align:center;">
            <div class="avatar" style="width:80px; height:80px; margin:20px auto; font-size:40px;">👤</div>
            <h2 id="my-name">User</h2>
            <button onclick="location.reload()" style="color:red; border:none; background:none; cursor:pointer;">Logout</button>
        </div>

        <nav>
            <div onclick="tab('home')" id="nav-home" class="nav-icon active">🏠</div>
            <div onclick="tab('search')" id="nav-search" class="nav-icon">🔍</div>
            <div onclick="tab('profile')" id="nav-profile" class="nav-icon">👤</div>
        </nav>
    </div>

    <div id="chat-screen">
        <div style="padding:15px; border-bottom:1px solid #eee; display:flex; align-items:center; gap:10px;">
            <span onclick="closeChat()" style="cursor:pointer; font-size:20px;">←</span>
            <b id="chat-name">User</b>
        </div>
        <div id="messages"></div>
        <div style="padding:10px; display:flex; gap:5px;">
            <input type="text" id="msg-input" placeholder="Message..." style="flex:1; padding:10px; border-radius:20px; border:1px solid #eee; outline:none;">
            <button onclick="sendMsg()" style="border:none; background:none; color:var(--accent); font-weight:bold;">Send</button>
        </div>
    </div>

    <div id="context-menu">
        <div class="menu-item" onclick="muteUser()">Mute Chat</div>
        <div class="menu-item" onclick="deleteChat()">Delete Chat</div>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyA7fMm1LjMOz4BefGk60cmMuSoFzBvJapg",
        databaseURL: "https://ultimatememories-64a97-default-rtdb.firebaseio.com",
        projectId: "ultimatememories-64a97",
        authDomain: "ultimatememories-64a97.firebaseapp.com"
    };
    firebase.initializeApp(config);
    const auth = firebase.auth(), db = firebase.database();

    let myU = "", myId = "", activeRoom = "", selectedUser = "", pressTimer;

    // Auth Logic
    async function authProcess(isLogin) {
        myU = document.getElementById('email').value.toLowerCase().trim();
        let p = document.getElementById('pass').value;
        try {
            if(isLogin) await auth.signInWithEmailAndPassword(myU + "@m.com", p);
            else {
                let res = await auth.createUserWithEmailAndPassword(myU + "@m.com", p);
                await db.ref('users/' + myU).set(res.user.uid);
            }
        } catch(e) { alert(e.message); }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            db.ref('users').orderByValue().equalTo(user.uid).once('value', s => {
                myU = Object.keys(s.val())[0]; myId = user.uid;
                startApp();
            });
        }
    });

    function startApp() {
        document.getElementById('screen-auth').classList.add('hidden');
        document.getElementById('screen-app').classList.remove('hidden');
        document.getElementById('my-name').innerText = myU;

        // Inbox with Long Press
        db.ref('partners/' + myId).on('value', s => {
            const list = document.getElementById('inbox-list'); list.innerHTML = "";
            s.forEach(p => {
                const name = p.key; const rid = p.val().sId;
                const item = document.createElement('div');
                item.className = `inbox-item ${p.val().muted ? 'muted' : ''}`;
                item.id = "item-" + name;
                item.innerHTML = `<div class="avatar">👤</div><div><b>${name}</b><br><small>Tap to chat</small></div><div class="msg-dot"></div>`;
                
                // Long Press (Hold) Events
                item.onmousedown = () => pressTimer = setTimeout(() => showMenu(name, rid), 800);
                item.onmouseup = () => clearTimeout(pressTimer);
                item.ontouchstart = () => pressTimer = setTimeout(() => showMenu(name, rid), 800);
                item.ontouchend = () => clearTimeout(pressTimer);
                item.onclick = () => openChat(name, rid);

                list.appendChild(item);
                
                // New Message Dot
                db.ref('chats/' + rid).limitToLast(1).on('child_added', snap => {
                    if(snap.val().u !== myU) document.getElementById('item-'+name).classList.add('has-new-msg');
                });
            });
        });

        // Heart Dot Logic (Requests)
        db.ref('requests/' + myId).on('value', s => {
            document.getElementById('heart-dot').style.display = s.exists() ? 'block' : 'none';
            const rl = document.getElementById('req-list'); rl.innerHTML = "";
            s.forEach(r => {
                rl.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span><b>${r.key}</b></span>
                    <button onclick="accept('${r.key}','${r.val()}')">Accept</button>
                </div>`;
            });
        });
    }

    // Context Menu Functions
    function showMenu(name, rid) {
        selectedUser = name;
        const menu = document.getElementById('context-menu');
        menu.style.display = 'block';
        menu.style.left = '100px';
        menu.style.top = event.pageY + 'px';
    }

    window.onclick = () => document.getElementById('context-menu').style.display = 'none';

    function muteUser() {
        db.ref(`partners/${myId}/${selectedUser}/muted`).set(true);
        alert(selectedUser + " Muted!");
    }

    function deleteChat() {
        if(confirm("Delete chat with " + selectedUser + "?")) {
            db.ref(`partners/${myId}/${selectedUser}`).remove();
        }
    }

    // Chat & Search
    function openChat(n, rid) {
        activeRoom = rid;
        document.getElementById('item-'+n).classList.remove('has-new-msg');
        document.getElementById('chat-name').innerText = n;
        document.getElementById('chat-screen').style.display = 'flex';
        db.ref('chats/' + rid).on('value', s => {
            const mBox = document.getElementById('messages'); mBox.innerHTML = "";
            s.forEach(m => {
                mBox.innerHTML += `<div class="msg ${m.val().u === myU ? 'sent' : 'received'}">${m.val().t}</div>`;
            });
            mBox.scrollTop = mBox.scrollHeight;
        });
    }

    function closeChat() { document.getElementById('chat-screen').style.display = 'none'; }

    function sendMsg() {
        let t = document.getElementById('msg-input').value;
        if(t && activeRoom) {
            db.ref('chats/' + activeRoom).push({ u: myU, t: t });
            document.getElementById('msg-input').value = "";
        }
    }

    function findUser() {
        let q = document.getElementById('search-user').value.toLowerCase().trim();
        db.ref('users/' + q).once('value', s => {
            if(s.exists() && q !== myU) {
                document.getElementById('search-res').innerHTML = `<b>${q}</b> <button onclick="sendReq('${q}','${s.val()}')">Add</button>`;
            } else alert("Not found");
        });
    }

    function sendReq(n, id) { db.ref('requests/' + id + '/' + myU).set(myId); alert("Request Sent!"); }
    
    function accept(n, id) {
        let room = myId < id ? myId + id : id + myId;
        db.ref('partners/' + myId + '/' + n).set({ sId: room });
        db.ref('partners/' + id + '/' + myU).set({ sId: room });
        db.ref('requests/' + myId + '/' + n).remove();
    }

    function tab(name) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
        document.getElementById('view-' + name).classList.remove('hidden');
        document.getElementById('nav-' + name).classList.add('active');
    }
</script>
</body>
</html>
