<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Memories 💖</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --main-color: #d63384; --bg-color: #fff5f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); margin: 0; padding: 20px; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .box { width: 90%; max-width: 380px; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 40px rgba(214, 51, 132, 0.1); border: 1px solid #ffdae9; text-align: center; position: relative; }
        h1 { color: var(--main-color); margin-bottom: 20px; font-size: 24px; }
        .input-group { position: relative; width: 100%; margin: 10px 0; text-align: left; }
        input { width: 100%; padding: 14px; border: 1px solid #fbcfe8; border-radius: 12px; outline: none; box-sizing: border-box; background: #fff9fb; font-size: 16px; }
        .iti { width: 100%; margin: 10px 0; } /* Country dropdown fix */
        .toggle-pass { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #aaa; font-size: 18px; z-index: 5; }
        .btn { background: var(--main-color); color: white; border: none; padding: 15px; border-radius: 15px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; font-size: 16px; }
        .hidden { display: none !important; }
        #recaptcha-container { margin-top: 10px; }
    </style>
</head>
<body>

    <div id="screen-login" class="box animate__animated animate__fadeInDown">
        <h1>🔑 Login</h1>
        <div class="input-group">
            <input type="text" id="log-phone" placeholder="Enter Mobile Number">
        </div>
        <div class="input-group">
            <input type="password" id="log-pass" placeholder="Secret Password">
            <span class="toggle-pass" onclick="togglePass('log-pass')">👁️</span>
        </div>
        <button class="btn" onclick="handleLogin()">Login</button>
        <p onclick="switchTo('register')" style="cursor:pointer; color:#d63384; font-size:14px; margin-top:15px; text-decoration: underline;">New User? Create Account</p>
    </div>

    <div id="screen-register" class="box hidden animate__animated animate__fadeInDown">
        <h1>📝 Register</h1>
        <div class="input-group">
            <input type="tel" id="reg-phone">
        </div>
        <div id="recaptcha-container"></div>
        <button class="btn" id="send-otp-btn" onclick="sendOTP()">Send Verification Code</button>
        
        <div id="otp-section" class="hidden">
            <input type="text" id="otp-code" placeholder="Enter 6-digit OTP">
            <div class="input-group">
                <input type="password" id="reg-pass" placeholder="Set Password">
                <span class="toggle-pass" onclick="togglePass('reg-pass')">👁️</span>
            </div>
            <button class="btn" onclick="verifyOTP()">Verify & Register</button>
        </div>
        <p onclick="switchTo('login')" style="cursor:pointer; color:#d63384; font-size:14px; margin-top:15px;">Back to Login</p>
    </div>

<script>
    // Initialize Country Code
    const phoneInput = document.querySelector("#reg-phone");
    const iti = window.intlTelInput(phoneInput, {
        initialCountry: "in", // India by default
        separateDialCode: true,
        utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
    });

    const firebaseConfig = {
        apiKey: "AIzaSyA7fMm1LjMOz4BefGk60cmMuSoFzBvJapg",
        databaseURL: "https://ultimatememories-64a97-default-rtdb.firebaseio.com",
        projectId: "ultimatememories-64a97",
        appId: "1:513888704426:web:b1476d30698d45dd117dd3",
        authDomain: "ultimatememories-64a97.firebaseapp.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    function switchTo(page) {
        document.querySelectorAll('.box').forEach(b => b.classList.add('hidden'));
        document.getElementById(page === 'login' ? 'screen-login' : 'screen-register').classList.remove('hidden');
    }

    function togglePass(id) {
        const p = document.getElementById(id);
        p.type = p.type === "password" ? "text" : "password";
    }

    function sendOTP() {
        const fullNumber = iti.getNumber(); // Auto adds +91
        if(!iti.isValidNumber()) return alert("Invalid phone number!");

        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });
        auth.signInWithPhoneNumber(fullNumber, window.recaptchaVerifier).then(res => {
            window.confirmationResult = res;
            alert("OTP Sent to " + fullNumber);
            document.getElementById('otp-section').classList.remove('hidden');
            document.getElementById('send-otp-btn').classList.add('hidden');
        }).catch(err => alert(err.message));
    }

    function verifyOTP() {
        const code = document.getElementById('otp-code').value;
        const pass = document.getElementById('reg-pass').value;
        const ph = iti.getNumber().replace('+', ''); // Save without +
        
        window.confirmationResult.confirm(code).then(() => {
            db.ref('users/' + ph).set({ password: pass }).then(() => {
                alert("Verified! Now Login.");
                location.reload();
            });
        }).catch(() => alert("Wrong OTP!"));
    }

    function handleLogin() {
        const ph = document.getElementById('log-phone').value.trim();
        const ps = document.getElementById('log-pass').value.trim();
        // Login mein hum user ko freedom de rahe hai number likhne ki
        db.ref('users/' + ph).once('value', s => {
            if(s.exists() && s.val().password === ps) {
                alert("Login Success!");
                // Yahan aap apna dashboard logic daal sakti hain
            } else { alert("Invalid Number or Password!"); }
        });
    }
</script>
</body>
</html>
