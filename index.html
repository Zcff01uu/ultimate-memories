<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memories Social 💖</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --accent: #d63384; --bg: #fff5f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        /* Professional Login Style */
        .auth-box { padding: 50px 30px; text-align: center; }
        .logo-text { font-family: 'Brush Script MT', cursive; font-size: 48px; color: var(--accent); margin-bottom: 40px; }
        .input-field { width: 90%; padding: 14px; margin-bottom: 15px; border: 1px solid #ffc1e3; border-radius: 10px; background: #fff9fb; outline: none; }
        .btn-primary { width: 90%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .switch-link { color: var(--accent); cursor: pointer; font-size: 14px; margin-top: 20px; display: block; text-decoration: none; }

        /* Inbox & Chat UI */
        header { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: white; position: sticky; top: 0; z-index: 100; }
        .inbox-item { padding: 15px; border-bottom: 1px solid #f9f9f9; display: flex; align-items: center; cursor: pointer; }
        .avatar { width: 45px; height: 45px; background: #ffd1dc; border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        #chat-screen { position: fixed; top: 0; width: 100%; max-width: 450px; height: 100%; background: white; z-index: 1000; display: none; flex-direction: column; }
        .chat-header { padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; font-weight: bold; }
        .back-btn { cursor: pointer; font-size: 24px; color: var(--accent); padding-right: 10px; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #fffafa; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 70%; font-size: 14px; word-wrap: break-word; }
        .sent { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #efefef; color: #333; border-bottom-left-radius: 2px; }

        nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; padding: 12px 0; }
        .nav-icon { font-size: 22px; cursor: pointer; color: #ccc; }
        .nav-icon.active { color: var(--accent); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-auth" class="auth-box">
        <div class="logo-text">Memories</div>
        <input type="text" id="email" class="input-field" placeholder="Username">
        <input type="password" id="pass" class="input-field" placeholder="Password">
        
        <div id="login-mode">
            <button class="btn-primary" onclick="login()">Log In</button>
            <span class="switch-link" onclick="toggleAuth(false)">Don't have an account? Sign Up</span>
        </div>
        
        <div id="signup-mode" class="hidden">
            <button class="btn-primary" onclick="signup()">Create Account</button>
            <span class="switch-link" onclick="toggleAuth(true)">Already have an account? Log In</span>
        </div>
    </div>

    <div id="screen-app" class="hidden">
        <header>
            <div class="logo-text" style="font-size: 24px; margin: 0;">Memories</div>
            <div style="cursor: pointer;" onclick="tab('search')">❤️</div>
        </header>

        <div id="view-home" class="view">
            <h4 style="margin: 15px;">Messages</h4>
            <div id="inbox-list"></div>
        </div>

        <div id="view-search" class="view hidden" style="padding: 20px;">
            <input type="text" id="search-user" class="input-field" placeholder="Search username...">
            <button class="btn-primary" onclick="findUser()">Search</button>
            <div id="search-res" style="margin-top: 20px;"></div>
            <h4>Friend Requests</h4>
            <div id="req-list"></div>
        </div>

        <div id="chat-screen">
            <div class="chat-header">
                <span class="back-btn" onclick="closeChat()">←</span>
                <span id="chat-name">User</span>
            </div>
            <div id="messages"></div>
            <div style="padding: 15px; display: flex; gap: 10px; border-top: 1px solid #eee;">
                <input type="text" id="msg-input" placeholder="Message..." style="flex:1; border: 1px solid #ddd; border-radius: 20px; padding: 10px;">
                <button onclick="send()" style="border:none; background:none; color:var(--accent); font-weight:bold;">Send</button>
            </div>
        </div>

        <nav>
            <div onclick="tab('home')" id="nav-home" class="nav-icon active">🏠</div>
            <div onclick="tab('search')" id="nav-search" class="nav-icon">🔍</div>
        </nav>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyA7fMm1LjMOz4BefGk60cmMuSoFzBvJapg",
        databaseURL: "https://ultimatememories-64a97-default-rtdb.firebaseio.com",
        projectId: "ultimatememories-64a97",
        authDomain: "ultimatememories-64a97.firebaseapp.com"
    };
    firebase.initializeApp(config);
    const auth = firebase.auth(), db = firebase.database();

    let myU = "", myId = "", activeRoom = "";

    function toggleAuth(isLogin) {
        document.getElementById('login-mode').classList.toggle('hidden', !isLogin);
        document.getElementById('signup-mode').classList.toggle('hidden', isLogin);
    }

    async function login() {
        myU = document.getElementById('email').value.toLowerCase().trim();
        let p = document.getElementById('pass').value;
        auth.signInWithEmailAndPassword(myU + "@m.com", p)
            .then(res => startApp(res.user.uid))
            .catch(e => alert("Invalid username or password!"));
    }

    async function signup() {
        myU = document.getElementById('email').value.toLowerCase().trim();
        let p = document.getElementById('pass').value;
        if(myU.length < 3) return alert("Username too short!");
        
        const snap = await db.ref('users/' + myU).once('value');
        if(snap.exists()) return alert("Username already taken!");

        auth.createUserWithEmailAndPassword(myU + "@m.com", p)
            .then(res => {
                db.ref('users/' + myU).set(res.user.uid);
                startApp(res.user.uid);
            }).catch(e => alert(e.message));
    }

    function startApp(uid) {
        myId = uid;
        document.getElementById('screen-auth').classList.add('hidden');
        document.getElementById('screen-app').classList.remove('hidden');

        // Load Inbox
        db.ref('partners/' + myId).on('value', s => {
            const list = document.getElementById('inbox-list');
            list.innerHTML = "";
            s.forEach(p => {
                const data = p.val();
                list.innerHTML += `
                <div class="inbox-item" onclick="openChat('${p.key}', '${data.sId}')">
                    <div class="avatar">👤</div>
                    <div><b>${p.key}</b><br><small style="color:grey;">Tap to chat</small></div>
                </div>`;
            });
        });

        // Load Requests
        db.ref('requests/' + myId).on('value', s => {
            const rl = document.getElementById('req-list'); rl.innerHTML = "";
            s.forEach(r => {
                rl.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span><b>${r.key}</b></span>
                    <button onclick="accept('${r.key}','${r.val()}')" style="background:var(--accent); color:white; border:none; border-radius:5px; padding:5px 10px;">Accept</button>
                </div>`;
            });
        });
    }

    function findUser() {
        let q = document.getElementById('search-user').value.toLowerCase().trim();
        db.ref('users/' + q).once('value', s => {
            if(s.exists() && q !== myU) {
                document.getElementById('search-res').innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:15px; border:1px solid #eee; border-radius:10px;">
                    <b>${q}</b>
                    <button onclick="sendReq('${q}','${s.val()}')" style="background:var(--accent); color:white; border:none; padding:8px 15px; border-radius:5px;">Add</button>
                </div>`;
            } else alert("User not found!");
        });
    }

    function sendReq(name, id) {
        db.ref('requests/' + id + '/' + myU).set(myId);
        alert("Request Sent!");
    }

    function accept(name, id) {
        let room = myId < id ? myId + id : id + myId;
        db.ref('partners/' + myId + '/' + name).set({ sId: room });
        db.ref('partners/' + id + '/' + myU).set({ sId: room });
        db.ref('requests/' + myId + '/' + name).remove();
    }

    function openChat(name, roomId) {
        activeRoom = roomId;
        document.getElementById('chat-name').innerText = name;
        document.getElementById('chat-screen').style.display = 'flex';
        db.ref('chats/' + roomId).on('value', s => {
            const cont = document.getElementById('messages');
            cont.innerHTML = "";
            s.forEach(m => {
                const d = m.val();
                cont.innerHTML += `<div class="msg ${d.u === myU ? 'sent' : 'received'}">${d.t}</div>`;
            });
            cont.scrollTop = cont.scrollHeight;
        });
    }

    function closeChat() { document.getElementById('chat-screen').style.display = 'none'; }

    function send() {
        let t = document.getElementById('msg-input').value;
        if(t && activeRoom) {
            db.ref('chats/' + activeRoom).push({ u: myU, t: t });
            document.getElementById('msg-input').value = "";
        }
    }

    function tab(name) {
        document.getElementById('view-home').classList.toggle('hidden', name !== 'home');
        document.getElementById('view-search').classList.toggle('hidden', name !== 'search');
        document.getElementById('nav-home').classList.toggle('active', name === 'home');
        document.getElementById('nav-search').classList.toggle('active', name === 'search');
    }
</script>
</body>
</html>
