<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memories Social 💖</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --main-color: #d63384; --bg-color: #fff5f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .box { width: 100%; max-width: 400px; background: white; min-height: 100vh; position: relative; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        /* Auth Screen */
        #screen-auth { padding: 40px 20px; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; box-sizing: border-box; }
        input { width: 100%; padding: 12px; border: 1.5px solid #fbcfe8; border-radius: 12px; outline: none; margin: 8px 0; background: #fff9fb; box-sizing: border-box; }
        .btn { background: var(--main-color); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
        .toggle-text { cursor: pointer; color: var(--main-color); margin-top: 15px; font-size: 13px; font-weight: 500; }

        /* Dashboard & Nav */
        #screen-main { display: none; flex-direction: column; height: 100vh; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 400px; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 100; }
        .nav-item { cursor: pointer; font-size: 22px; color: #ccc; }
        .nav-item.active { color: var(--main-color); }

        .content-section { flex: 1; padding: 15px; overflow-y: auto; display: none; margin-bottom: 70px; }
        .active-section { display: block; }
        
        #msg-container { display: flex; flex-direction: column; gap: 8px; padding-bottom: 10px; }
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 70%; font-size: 14px; word-wrap: break-word; }
        .msg.sent { background: var(--main-color); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.received { background: #f1f1f1; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }

        #gallery { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; }
        .img-container { aspect-ratio: 1/1; background: #eee; overflow: hidden; }
        .img-card { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="box">
        <div id="screen-auth" class="animate__animated animate__fadeIn">
            <h1 id="auth-title" style="color:var(--main-color)">Login 💖</h1>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" id="auth-btn" onclick="handleAuth()">Login Now</button>
            <p class="toggle-text" onclick="toggleAuthMode()" id="toggle-link">New User? Register here</p>
        </div>

        <div id="screen-main">
            <div id="sec-home" class="content-section active-section">
                <div style="padding-bottom: 15px; border-bottom: 1px solid #eee;">
                    <input type="text" id="searchUser" placeholder="Find Username..." style="width:75%; display:inline-block;">
                    <button onclick="sendRequest()" class="btn" style="width:20%; padding:10px;">Add</button>
                    <div id="pending-list"></div>
                </div>
                
                <div id="chat-area" style="margin-top:20px;">
                    <h4 id="partner-status" style="text-align:center; color:#999;">Search a friend to start</h4>
                    <div id="msg-container"></div>
                    <div style="display:flex; gap:5px; margin-top:10px;">
                        <input type="text" id="msgInput" placeholder="Write message..." style="margin:0;">
                        <button onclick="sendMsg()" class="btn" style="width:50px; margin:0;">➔</button>
                    </div>
                </div>
            </div>

            <div id="sec-gallery" class="content-section">
                <h3>Shared Gallery 📸</h3>
                <div id="gallery"></div>
            </div>

            <div id="sec-upload" class="content-section">
                <h3>Post Photo ✨</h3>
                <input type="file" id="filePicker">
                <button class="btn" onclick="uploadImg()" id="up-btn">Upload to Shared Space</button>
                <br><br>
                <button onclick="location.reload()" style="background:none; border:none; color:red; cursor:pointer; font-size:12px;">Logout</button>
            </div>

            <div class="bottom-nav">
                <div class="nav-item active" onclick="showSec('home', this)">🏠</div>
                <div class="nav-item" onclick="showSec('gallery', this)">📸</div>
                <div class="nav-item" onclick="showSec('upload', this)">📤</div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA7fMm1LjMOz4BefGk60cmMuSoFzBvJapg",
        databaseURL: "https://ultimatememories-64a97-default-rtdb.firebaseio.com",
        projectId: "ultimatememories-64a97",
        appId: "1:513888704426:web:b1476d30698d45dd117dd3",
        authDomain: "ultimatememories-64a97.firebaseapp.com"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    
    let isLoginMode = true;
    let myUser = "", myUid = "", sharedId = "";

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "Login 💖" : "Register 📝";
        document.getElementById('auth-btn').innerText = isLoginMode ? "Login Now" : "Create Account";
        document.getElementById('toggle-link').innerText = isLoginMode ? "New User? Register here" : "Already have an account? Login";
    }

    function handleAuth() {
        myUser = document.getElementById('username').value.trim().toLowerCase();
        const pass = document.getElementById('pass').value;
        if(!myUser || !pass) return alert("Details bhariye!");
        const email = myUser + "@memories.com";

        if(isLoginMode) {
            auth.signInWithEmailAndPassword(email, pass)
                .then(u => { myUid = u.user.uid; startApp(); })
                .catch(() => alert("Wrong details or User not found!"));
        } else {
            auth.createUserWithEmailAndPassword(email, pass)
                .then(u => {
                    myUid = u.user.uid;
                    db.ref('users/' + myUser).set(myUid);
                    alert("Account Created! Login kijiye.");
                    location.reload();
                }).catch(e => alert(e.message));
        }
    }

    function startApp() {
        document.getElementById('screen-auth').style.display = 'none';
        document.getElementById('screen-main').style.display = 'flex';
        db.ref('requests/' + myUid).on('value', s => {
            const list = document.getElementById('pending-list');
            list.innerHTML = "";
            s.forEach(child => {
                list.innerHTML += `<div style="background:#fff0f5; padding:8px; border-radius:10px; margin-top:5px; font-size:12px; display:flex; justify-content:space-between;">
                    ${child.key} wants to connect <button onclick="acceptReq('${child.key}', '${child.val()}')" style="background:#2ecc71; color:white; border:none; padding:2px 8px; border-radius:5px;">Accept</button>
                </div>`;
            });
        });
        checkPartner();
    }

    function sendRequest() {
        const target = document.getElementById('searchUser').value.trim().toLowerCase();
        if(target === myUser) return alert("Khud ko add nahi kar sakte!");
        db.ref('users/' + target).once('value', s => {
            if(s.exists()) {
                db.ref('requests/' + s.val() + '/' + myUser).set(myUid);
                alert("Request Sent!");
            } else alert("User not found!");
        });
    }

    function acceptReq(name, uid) {
        const sId = myUid < uid ? myUid + uid : uid + myUid;
        db.ref('partners/' + myUid).set({ name: name, sId: sId });
        db.ref('partners/' + uid).set({ name: myUser, sId: sId });
        db.ref('requests/' + myUid + '/' + name).remove();
    }

    function checkPartner() {
        db.ref('partners/' + myUid).on('value', s => {
            if(s.exists()) {
                const data = s.val();
                sharedId = data.sId;
                document.getElementById('partner-status').innerText = "Space shared with " + data.name;
                loadContent();
            }
        });
    }

    function loadContent() {
        db.ref('chats/' + sharedId).on('value', snap => {
            const con = document.getElementById('msg-container'); con.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                if(d && d.t) {
                    con.innerHTML += `<div class="msg ${d.u===myUser?'sent':'received'}">${d.t}</div>`;
                }
            });
            con.scrollTop = con.scrollHeight;
        });
        db.ref('photos/' + sharedId).on('value', snap => {
            const gal = document.getElementById('gallery'); gal.innerHTML = "";
            snap.forEach(c => {
                gal.innerHTML += `<div class="img-container"><img src="${c.val()}" class="img-card"></div>`;
            });
        });
    }

    async function uploadImg() {
        const file = document.getElementById('filePicker').files[0];
        if(!file || !sharedId) return alert("Pehle partner add karein!");
        const btn = document.getElementById('up-btn'); btn.innerText = "Uploading...";
        const formData = new FormData(); formData.append("image", file);
        const res = await fetch("https://api.imgbb.com/1/upload?key=cb53c38c41a5ce7d642d1152d306da9a", {method:"POST", body:formData});
        const data = await res.json();
        db.ref('photos/' + sharedId).push(data.data.url);
        btn.innerText = "Upload to Shared Space";
        showSec('gallery', document.querySelectorAll('.nav-item')[1]);
    }

    function sendMsg() {
        const t = document.getElementById('msgInput').value;
        if(t && sharedId) db.ref('chats/' + sharedId).push({ u: myUser, t: t });
        document.getElementById('msgInput').value = "";
    }

    function showSec(id, el) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active-section'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('sec-' + id).classList.add('active-section');
        el.classList.add('active');
    }
</script>
</body>
</html>
