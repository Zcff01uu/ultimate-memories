<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Memories 💖</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; overflow-x: hidden;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #fff5f8 0%, #ffe4ef 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        
        .heart-particle {
            position: fixed; pointer-events: none;
            color: #d63384; font-size: 20px;
            animation: fly 1s linear forwards;
            z-index: 9999;
        }
        @keyframes fly {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(0); opacity: 0; }
        }

        .box { 
            width: 90%; max-width: 380px; background: white; 
            padding: 30px; border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(214, 51, 132, 0.1); 
            border: 1px solid #ffdae9; text-align: center;
            z-index: 10;
        }
        h1 { color: #d63384; margin-bottom: 25px; font-size: 24px; }
        input { 
            width: 100%; padding: 14px; margin: 10px 0; 
            border: 1px solid #fbcfe8; border-radius: 12px; 
            outline: none; box-sizing: border-box; background: #fff9fb;
        }
        .btn { 
            background: #d63384; color: white; border: none; 
            padding: 15px; border-radius: 15px; cursor: pointer; 
            width: 100%; font-weight: bold; margin-top: 15px; font-size: 16px;
        }
        .btn-outline { background: none; color: #d63384; border: 2px solid #d63384; margin-top: 15px; }
        
        #gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .img-wrap { position: relative; }
        .thumb { width: 100%; height: 140px; object-fit: cover; border-radius: 15px; border: 2px solid #fff; cursor: pointer; }
        .del-icon { position: absolute; top: 5px; right: 5px; background: rgba(255,0,0,0.7); color: white; border-radius: 50%; padding: 5px; cursor: pointer; font-size: 12px; border: none; }
        
        .hidden { display: none; }
        #status { color: #d63384; margin-top: 10px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div id="auth-page" class="box">
    <h1 id="header-text">🔑 Login</h1>
    <input type="text" id="phone" placeholder="Mobile Number">
    <input type="password" id="pass" placeholder="Secret Password">
    <button class="btn" id="action-btn" onclick="handleAuth()">Enter Vault</button>
    <div id="status"></div>
    
    <p id="to-signup" style="cursor:pointer; color:#d63384; margin-top:15px; font-size:14px;">
        New User? <span style="text-decoration:underline;" onclick="toggleAuth(false)">Create Account</span>
    </p>
    <p id="to-login" class="hidden" style="cursor:pointer; color:#d63384; margin-top:15px; font-size:14px;">
        Already have an account? <span style="text-decoration:underline;" onclick="toggleAuth(true)">Login Here</span>
    </p>
</div>

<div id="dashboard" class="box hidden">
    <h1>Welcome 💖</h1>
    <button class="btn" onclick="showScreen('upload-page')">📤 Upload Photo</button>
    <button class="btn btn-outline" onclick="showScreen('gallery-page')">🖼️ See Memories</button>
    <button onclick="location.reload()" style="background:none; border:none; color:#aaa; margin-top:20px; cursor:pointer;">Logout</button>
</div>

<div id="upload-page" class="box hidden">
    <h1>Upload Photo</h1>
    <input type="file" id="filePicker" accept="image/*">
    <button class="btn" onclick="uploadImg()">Save to Cloud ✨</button>
    <div id="upload-status"></div>
    <button class="btn btn-outline" onclick="showScreen('dashboard')">Back</button>
</div>

<div id="gallery-page" class="box hidden">
    <h1>Memories</h1>
    <div id="gallery"></div>
    <button class="btn btn-outline" onclick="showScreen('dashboard')">Back</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA7fMm1LjMOz4BefGk60cmMuSoFzBvJapg",
        databaseURL: "https://ultimatememories-64a97-default-rtdb.firebaseio.com",
        projectId: "ultimatememories-64a97",
        appId: "1:513888704426:web:b1476d30698d45dd117dd3"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const IMGBB_KEY = "cb53c38c41a5ce7d642d1152d306da9a";

    let isLoginMode = true; 
    let user = null;

    function toggleAuth(showLogin) {
        isLoginMode = showLogin;
        document.getElementById('header-text').innerText = isLoginMode ? "🔑 Login" : "📝 Register";
        document.getElementById('action-btn').innerText = isLoginMode ? "Enter Vault" : "Create Account";
        document.getElementById('to-signup').classList.toggle('hidden', !isLoginMode);
        document.getElementById('to-login').classList.toggle('hidden', isLoginMode);
        document.getElementById('status').innerText = "";
    }

    function handleAuth() {
        const ph = document.getElementById('phone').value.trim();
        const ps = document.getElementById('pass').value.trim();
        const status = document.getElementById('status');
        
        if(!ph || !ps) { status.innerText = "❌ Details bharo!"; return; }

        if(isLoginMode) {
            db.ref('users/'+ph).once('value', s => {
                if(s.exists() && s.val().password === ps) { 
                    user=ph; showScreen('dashboard'); loadPhotos(); 
                } else { status.innerText = "❌ Wrong number or password!"; }
            });
        } else {
            db.ref('users/'+ph).once('value', s => {
                if(s.exists()) { status.innerText = "❌ Number already registered!"; }
                else {
                    db.ref('users/'+ph).set({password: ps}).then(() => {
                        alert("Account Created! Ab login karein.");
                        toggleAuth(true);
                    });
                }
            });
        }
    }

    function showScreen(id) {
        document.querySelectorAll('.box').forEach(b => b.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    async function uploadImg() {
        const file = document.getElementById('filePicker').files[0];
        const uStatus = document.getElementById('upload-status');
        if(!file) return alert("Select photo!");
        uStatus.innerText = "Uploading... ⏳";
        const fd = new FormData(); fd.append("image", file);
        try {
            const res = await fetch("https://api.imgbb.com/1/upload?key="+IMGBB_KEY, {method:"POST", body:fd});
            const data = await res.json();
            db.ref('pics/'+user).push(data.data.url);
            uStatus.innerText = "Saved! ✅";
            setTimeout(() => showScreen('dashboard'), 1000);
        } catch(e) { uStatus.innerText = "Fail! ❌"; }
    }

    function loadPhotos() {
        const gal = document.getElementById('gallery');
        db.ref('pics/'+user).on('value', snap => {
            gal.innerHTML = "";
            snap.forEach(child => {
                const wrap = document.createElement('div');
                wrap.className = 'img-wrap';
                wrap.innerHTML = `
                    <img src="${child.val()}" class="thumb">
                    <button class="del-icon" onclick="deletePic('${child.key}')">X</button>
                `;
                gal.prepend(wrap);
            });
        });
    }

    function deletePic(key) {
        if(confirm("Delete karni hai ye memory?")) {
            db.ref('pics/'+user+'/'+key).remove();
        }
    }

    // INTERACTIVE HEARTS
    document.addEventListener('mousemove', (e) => { if(Math.random() > 0.9) createHeart(e.clientX, e.clientY); });
    document.addEventListener('touchstart', (e) => { createHeart(e.touches[0].clientX, e.touches[0].clientY); });
    function createHeart(x, y) {
        const heart = document.createElement('div'); heart.innerHTML = "❤️";
        heart.className = 'heart-particle'; heart.style.left = x + 'px'; heart.style.top = y + 'px';
        document.body.appendChild(heart); setTimeout(() => heart.remove(), 1000);
    }
</script>
</body>
</html>
