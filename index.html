<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Memories 💖</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --main-color: #d63384; --bg-color: #fff5f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; }
        
        .box { width: 100%; max-width: 400px; background: white; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        /* Auth Screen Styling */
        #screen-auth { padding: 40px 20px; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100vh; box-sizing: border-box; }
        .input-group { position: relative; width: 100%; margin: 10px 0; }
        input { width: 100%; padding: 15px; border: 1.5px solid #fbcfe8; border-radius: 12px; outline: none; background: #fff9fb; font-size: 16px; box-sizing: border-box; }
        .toggle-pass { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #888; font-size: 20px; z-index: 10; }
        
        /* Dashboard Styling */
        #screen-main { display: none; flex-direction: column; min-height: 100vh; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 400px; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; }
        .nav-item { cursor: pointer; font-size: 24px; color: #ccc; transition: 0.3s; }
        .nav-item.active { color: var(--main-color); }

        .content-section { flex: 1; padding: 20px; padding-bottom: 80px; overflow-y: auto; }
        .hidden { display: none !important; }

        /* Chat & Gallery Grid */
        #msg-container { height: 60vh; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 10px; background: #fff9fb; border-radius: 15px; }
        .msg { padding: 10px 15px; border-radius: 20px; max-width: 75%; font-size: 14px; }
        .msg.sent { background: var(--main-color); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.received { background: #efefef; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }

        #gallery { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; }
        .img-container { aspect-ratio: 1/1; overflow: hidden; background: #eee; }
        .img-card { width: 100%; height: 100%; object-fit: cover; }

        .btn { background: var(--main-color); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .heart { position: fixed; color: var(--main-color); font-size: 18px; pointer-events: none; animation: fly 1s linear forwards; z-index: 9999; }
        @keyframes fly { 0% { transform: translate(0,0); opacity:1; } 100% { transform: translate(var(--x), var(--y)); opacity:0; } }
    </style>
</head>
<body>

    <div class="box">
        <div id="screen-auth" class="animate__animated animate__fadeIn">
            <h1>Ultimate Memories 💖</h1>
            <div class="input-group">
                <input type="text" id="username" placeholder="Username">
            </div>
            <div class="input-group">
                <input type="password" id="pass" placeholder="Password">
                <span class="toggle-pass" onclick="togglePass()">👁️</span>
            </div>
            <button class="btn" onclick="handleAuth()">Login / Register</button>
            <p style="font-size:12px; color:#999; margin-top:20px;">Shared space for you and your partner</p>
        </div>

        <div id="screen-main">
            <div id="sec-chat" class="content-section animate__animated animate__fadeIn">
                <h1>Messages 💬</h1>
                <div id="msg-container"></div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <input type="text" id="msgInput" placeholder="Message..." style="margin:0;">
                    <button onclick="sendMsg()" class="btn" style="width:60px; margin:0; padding:10px;">➔</button>
                </div>
            </div>

            <div id="sec-gallery" class="content-section hidden animate__animated animate__fadeIn">
                <h1>Gallery 📸</h1>
                <div id="gallery"></div>
            </div>

            <div id="sec-upload" class="content-section hidden animate__animated animate__fadeIn">
                <h1>New Memory ✨</h1>
                <div style="text-align:center; padding:40px 20px; border:2px dashed #ddd; border-radius:20px; margin-top:20px;">
                    <input type="file" id="filePicker">
                    <button class="btn" onclick="uploadImg()" id="up-btn">Post Memory ❤️</button>
                </div>
                <button onclick="location.reload()" style="margin-top:50px; background:none; border:none; color:red; cursor:pointer;">Logout</button>
            </div>

            <div class="bottom-nav">
                <div class="nav-item active" onclick="showSec('chat', this)">🏠</div>
                <div class="nav-item" onclick="showSec('gallery', this)">📸</div>
                <div class="nav-item" onclick="showSec('upload', this)">📤</div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA7fMm1LjMOz4BefGk60cmMuSoFzBvJapg",
        databaseURL: "https://ultimatememories-64a97-default-rtdb.firebaseio.com",
        projectId: "ultimatememories-64a97",
        appId: "1:513888704426:web:b1476d30698d45dd117dd3",
        authDomain: "ultimatememories-64a97.firebaseapp.com"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    
    let currentUser = "";
    let sharedUid = "";

    function togglePass() { const p = document.getElementById('pass'); p.type = p.type==="password"?"text":"password"; }

    function handleAuth() {
        currentUser = document.getElementById('username').value.trim();
        const pass = document.getElementById('pass').value;
        if(!currentUser || !pass) return alert("Details fill karein!");

        const email = currentUser + "@memories.com";
        auth.signInWithEmailAndPassword(email, pass)
            .then(u => loginSuccess(u.user.uid))
            .catch(() => {
                auth.createUserWithEmailAndPassword(email, pass)
                    .then(u => {
                        alert("Account Created! Pehle Login karein.");
                        location.reload();
                    })
                    .catch(e => alert(e.message));
            });
    }

    function loginSuccess(uid) {
        sharedUid = uid;
        document.getElementById('screen-auth').style.display = 'none'; // Login chhupao
        document.getElementById('screen-main').style.display = 'flex'; // App dikhao
        loadData();
    }

    function showSec(sec, el) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('sec-' + sec).classList.remove('hidden');
        el.classList.add('active');
    }

    function loadData() {
        db.ref('photos/' + sharedUid).on('value', snap => {
            const gal = document.getElementById('gallery'); gal.innerHTML = "";
            snap.forEach(c => gal.innerHTML += `<div class="img-container"><img src="${c.val()}" class="img-card"></div>`);
        });
        db.ref('chats/' + sharedUid).on('value', snap => {
            const con = document.getElementById('msg-container'); con.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                con.innerHTML += `<div class="msg ${d.u===currentUser?'sent':'received'}">${d.t}</div>`;
            });
            con.scrollTop = con.scrollHeight;
        });
    }

    async function uploadImg() {
        const file = document.getElementById('filePicker').files[0];
        if(!file) return alert("Select photo!");
        const btn = document.getElementById('up-btn'); btn.innerText = "Posting...";
        const formData = new FormData(); formData.append("image", file);
        const res = await fetch("https://api.imgbb.com/1/upload?key=cb53c38c41a5ce7d642d1152d306da9a", {method:"POST", body:formData});
        const data = await res.json();
        db.ref('photos/' + sharedUid).push(data.data.url);
        btn.innerText = "Post Memory ❤️";
        showSec('gallery', document.querySelectorAll('.nav-item')[1]);
    }

    function sendMsg() {
        const t = document.getElementById('msgInput').value;
        if(t) db.ref('chats/' + sharedUid).push({ u: currentUser, t: t });
        document.getElementById('msgInput').value = "";
    }

    document.addEventListener('mousemove', (e) => {
        if(Math.random() > 0.95) {
            const h = document.createElement('div'); h.className = 'heart'; h.innerHTML = "❤️";
            h.style.left = e.clientX + 'px'; h.style.top = e.clientY + 'px';
            h.style.setProperty('--x', (Math.random()*100-50)+'px'); h.style.setProperty('--y', (Math.random()*-100-50)+'px');
            document.body.appendChild(h); setTimeout(() => h.remove(), 1000);
        }
    });
</script>
</body>
</html>
