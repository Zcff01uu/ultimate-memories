<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Memories 💖</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --main-color: #d63384; --bg-color: #fff5f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); margin: 0; padding: 15px; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .box { width: 95%; max-width: 400px; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 40px rgba(214,51,132,0.15); text-align: center; position: relative; }
        input { width: 100%; padding: 12px; border: 1.5px solid #fbcfe8; border-radius: 12px; outline: none; box-sizing: border-box; background: #fff9fb; margin: 8px 0; }
        .btn { background: var(--main-color); color: white; border: none; padding: 14px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .hidden { display: none !important; }
        
        /* Search & Requests UI */
        .search-box { margin-bottom: 20px; border-bottom: 2px solid var(--bg-color); padding-bottom: 15px; }
        .req-item { background: #fff0f5; padding: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; font-size: 14px; }
        .acc-btn { background: #2ecc71; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        /* Chat UI */
        #msg-container { height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 10px; background: #fdf2f7; border-radius: 15px; margin: 10px 0; }
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 80%; font-size: 13px; }
        .msg.sent { background: var(--main-color); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.received { background: #eee; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }

        #gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-height: 200px; overflow-y: auto; margin-bottom: 10px; }
        .img-container { border-radius: 10px; height: 80px; overflow: hidden; border: 2px solid white; }
        .img-card { width: 100%; height: 100%; object-fit: cover; }
        
        .toggle-pass { position: absolute; right: 40px; margin-top: 25px; cursor: pointer; color: #888; }
        .heart { position: fixed; color: var(--main-color); font-size: 18px; pointer-events: none; animation: fly 1s linear forwards; }
        @keyframes fly { 0% { transform: translate(0,0); opacity:1; } 100% { transform: translate(var(--x), var(--y)); opacity:0; } }
    </style>
</head>
<body>

    <div id="screen-auth" class="box animate__animated animate__zoomIn">
        <h1>💖 Welcome</h1>
        <input type="text" id="username" placeholder="Your Username">
        <span class="toggle-pass" onclick="togglePass()">👁️</span>
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="handleAuth()">Access Space</button>
        <p onclick="toggleMode()" id="toggle-text" style="cursor:pointer; color:var(--main-color); margin-top:15px; font-size:13px;">New? Create Account</p>
    </div>

    <div id="screen-main" class="box hidden animate__animated animate__fadeIn">
        <div class="search-box">
            <input type="text" id="searchUser" placeholder="Search Partner Username..." style="width:70%;">
            <button onclick="sendRequest()" style="width:25%; padding:10px; border-radius:10px; background:var(--main-color); color:white; border:none;">Add</button>
            <div id="pending-requests" style="margin-top:10px;"></div>
        </div>

        <div id="partner-status" style="font-size: 12px; color: #888; margin-bottom: 10px;">No Partner Connected</div>

        <div id="shared-content" class="hidden">
            <div id="gallery"></div>
            <input type="file" id="filePicker" style="font-size: 10px;">
            <button class="btn" onclick="uploadImg()" id="up-btn" style="font-size: 12px; padding: 8px;">Upload Photo ✨</button>

            <div id="msg-container"></div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="msgInput" placeholder="Message..." style="margin:0;">
                <button onclick="sendMsg()" class="btn" style="width:50px; margin:0;">➔</button>
            </div>
        </div>
        
        <button onclick="location.reload()" style="background:none; border:none; color:#bbb; margin-top:15px; cursor:pointer; font-size:12px;">Logout</button>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA7fMm1LjMOz4BefGk60cmMuSoFzBvJapg",
        databaseURL: "https://ultimatememories-64a97-default-rtdb.firebaseio.com",
        projectId: "ultimatememories-64a97",
        appId: "1:513888704426:web:b1476d30698d45dd117dd3",
        authDomain: "ultimatememories-64a97.firebaseapp.com"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    
    let isLogin = true;
    let myUser = "";
    let partnerUid = null;

    function toggleMode() { isLogin = !isLogin; document.getElementById('toggle-text').innerText = isLogin ? "New? Create Account" : "Back to Login"; }
    function togglePass() { const p = document.getElementById('pass'); p.type = p.type==="password"?"text":"password"; }

    function handleAuth() {
        myUser = document.getElementById('username').value.trim();
        const pass = document.getElementById('pass').value;
        const email = myUser + "@memories.com";

        if(isLogin) {
            auth.signInWithEmailAndPassword(email, pass).then(u => {
                showMain(u.user.uid);
            }).catch(e => alert("Wrong Details!"));
        } else {
            auth.createUserWithEmailAndPassword(email, pass).then(u => {
                db.ref('users/' + myUser).set(u.user.uid);
                alert("Account Created!"); toggleMode();
            });
        }
    }

    function showMain(uid) {
        window.myUid = uid;
        document.getElementById('screen-auth').classList.add('hidden');
        document.getElementById('screen-main').classList.remove('hidden');
        checkRequests();
        checkPartner();
    }

    // Friend Request Logic
    function sendRequest() {
        const target = document.getElementById('searchUser').value.trim();
        db.ref('users/' + target).once('value', s => {
            if(s.exists()) {
                db.ref('requests/' + s.val() + '/' + myUser).set(window.myUid);
                alert("Request Sent!");
            } else { alert("User not found!"); }
        });
    }

    function checkRequests() {
        db.ref('requests/' + window.myUid).on('value', s => {
            const div = document.getElementById('pending-requests');
            div.innerHTML = "";
            s.forEach(child => {
                div.innerHTML += `<div class="req-item">${child.key} wants to connect <button class="acc-btn" onclick="acceptReq('${child.key}', '${child.val()}')">Accept</button></div>`;
            });
        });
    }

    function acceptReq(name, uid) {
        const sharedId = window.myUid < uid ? window.myUid + uid : uid + window.myUid;
        db.ref('partners/' + window.myUid).set({ name: name, sharedId: sharedId });
        db.ref('partners/' + uid).set({ name: myUser, sharedId: sharedId });
        db.ref('requests/' + window.myUid + '/' + name).remove();
    }

    function checkPartner() {
        db.ref('partners/' + window.myUid).on('value', s => {
            if(s.exists()) {
                const data = s.val();
                document.getElementById('partner-status').innerText = "Connected with " + data.name;
                document.getElementById('shared-content').classList.remove('hidden');
                loadSharedSpace(data.sharedId);
            }
        });
    }

    function loadSharedSpace(sid) {
        window.sid = sid;
        db.ref('photos/' + sid).on('value', snap => {
            const gal = document.getElementById('gallery'); gal.innerHTML = "";
            snap.forEach(c => gal.innerHTML = `<div class="img-container"><img src="${c.val()}" class="img-card"></div>` + gal.innerHTML);
        });
        db.ref('chats/' + sid).on('value', snap => {
            const con = document.getElementById('msg-container'); con.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                con.innerHTML += `<div class="msg ${d.u===myUser?'sent':'received'}">${d.t}</div>`;
            });
            con.scrollTop = con.scrollHeight;
        });
    }

    async function uploadImg() {
        const file = document.getElementById('filePicker').files[0];
        const formData = new FormData(); formData.append("image", file);
        const res = await fetch("https://api.imgbb.com/1/upload?key=cb53c38c41a5ce7d642d1152d306da9a", {method:"POST", body:formData});
        const data = await res.json();
        db.ref('photos/' + window.sid).push(data.data.url);
    }

    function sendMsg() {
        const t = document.getElementById('msgInput').value;
        if(t) db.ref('chats/' + window.sid).push({ u: myUser, t: t });
        document.getElementById('msgInput').value = "";
    }

    // Heart animation
    document.addEventListener('mousemove', (e) => {
        if(Math.random() > 0.9) {
            const h = document.createElement('div'); h.className = 'heart'; h.innerHTML = "❤️";
            h.style.left = e.clientX + 'px'; h.style.top = e.clientY + 'px';
            h.style.setProperty('--x', (Math.random()*100-50)+'px'); h.style.setProperty('--y', (Math.random()*-100-50)+'px');
            document.body.appendChild(h); setTimeout(() => h.remove(), 1000);
        }
    });
</script>
</body>
</html>
