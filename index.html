<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couple Vault 💖</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fff5f8; text-align: center; margin: 0; padding: 20px; }
        .box { max-width: 400px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #ffdae9; }
        h1 { color: #d63384; }
        input[type="text"], input[type="password"] { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #fbcfe8; border-radius: 10px; outline: none; }
        .btn { background: #d63384; color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; margin: 10px 0; font-size: 16px; }
        .btn-outline { background: white; color: #d63384; border: 2px solid #d63384; }
        
        /* Gallery */
        #gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .thumb { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .thumb:hover { transform: scale(1.02); }

        /* Modal (Zoom View) */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #modal img { max-width: 90%; max-height: 70%; border-radius: 10px; }
        .del-btn { background: #ff4757; color: white; border: none; padding: 12px 25px; border-radius: 8px; margin-top: 20px; cursor: pointer; font-weight: bold; }
        .close-modal { position: absolute; top: 20px; right: 20px; color: white; font-size: 30px; cursor: pointer; }

        .hidden { display: none; }
        #status { color: #d63384; font-weight: bold; margin: 10px; }
    </style>
</head>
<body>

<div id="auth-page" class="box">
    <h1 id="auth-title">🔒 Private Vault</h1>
    <input type="text" id="phone" placeholder="Mobile Number">
    <input type="password" id="pass" placeholder="Secret Password">
    <button class="btn" onclick="handleAuth()">Enter Vault</button>
    <p onclick="toggleAuth()" style="cursor:pointer; color:#d63384; font-size:13px;">New User? Create Account</p>
</div>

<div id="dashboard" class="box hidden">
    <h1>Welcome 💖</h1>
    <button class="btn" onclick="showSection('upload-page')">📤 Upload New Photo</button>
    <button class="btn btn-outline" onclick="showSection('gallery-page')">🖼️ See Memories</button>
    <button onclick="location.reload()" style="background:none; border:none; color:#888; cursor:pointer;">Logout</button>
</div>

<div id="upload-page" class="box hidden">
    <h1>Upload Photo</h1>
    <input type="file" id="filePicker" accept="image/*">
    <button class="btn" onclick="uploadImg()">Save to Cloud ✨</button>
    <div id="status"></div>
    <button class="btn btn-outline" onclick="showSection('dashboard')">Back to Menu</button>
</div>

<div id="gallery-page" class="box hidden">
    <h1>Our Memories</h1>
    <div id="gallery"></div>
    <button class="btn btn-outline" onclick="showSection('dashboard')" style="margin-top:20px;">Back to Menu</button>
</div>

<div id="modal">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <img id="full-img" src="">
    <button class="del-btn" id="delete-trigger">Delete This Photo 🗑️</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA7fMm1LjMOz4BefGk60cmMuSoFzBvJapg",
        databaseURL: "https://ultimatememories-64a97-default-rtdb.firebaseio.com",
        projectId: "ultimatememories-64a97",
        appId: "1:513888704426:web:b1476d30698d45dd117dd3"
    };
    const IMGBB_KEY = "cb53c38c41a5ce7d642d1152d306da9a"; 
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isLogin = true; let user = null; let currentPhotoKey = null;

    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('auth-title').innerText = isLogin ? "🔑 Login Vault" : "🔒 Register Vault";
    }

    function handleAuth() {
        const ph = document.getElementById('phone').value;
        const ps = document.getElementById('pass').value;
        if(!ph || !ps) return alert("Details bharo!");
        if(isLogin) {
            db.ref('users/'+ph).once('value', s => {
                if(s.exists() && s.val().password === ps) { user=ph; showSection('dashboard'); loadPhotos(); }
                else alert("Wrong details!");
            });
        } else {
            db.ref('users/'+ph).set({password: ps}).then(() => { alert("Created! Now Login."); isLogin=true; toggleAuth(); });
        }
    }

    function showSection(id) {
        document.querySelectorAll('.box').forEach(b => b.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    async function uploadImg() {
        const file = document.getElementById('filePicker').files[0];
        if(!file) return alert("Photo chuno!");
        document.getElementById('status').innerText = "Uploading... ⏳";
        const fd = new FormData(); fd.append("image", file);
        try {
            const res = await fetch("https://api.imgbb.com/1/upload?key="+IMGBB_KEY, {method:"POST", body:fd});
            const data = await res.json();
            db.ref('pics/'+user).push(data.data.url);
            document.getElementById('status').innerText = "Saved! ✅";
            setTimeout(() => { document.getElementById('status').innerText=""; showSection('dashboard'); }, 1500);
        } catch(e) { alert("Fail!"); }
    }

    function loadPhotos() {
        const gal = document.getElementById('gallery');
        gal.innerHTML = "";
        db.ref('pics/'+user).on('value', snap => {
            gal.innerHTML = "";
            snap.forEach(child => {
                const img = document.createElement('img');
                img.src = child.val();
                img.className = 'thumb';
                img.onclick = () => openModal(child.val(), child.key);
                gal.prepend(img);
            });
        });
    }

    function openModal(url, key) {
        document.getElementById('modal').style.display = "flex";
        document.getElementById('full-img').src = url;
        currentPhotoKey = key;
        document.getElementById('delete-trigger').onclick = () => deletePhoto(key);
    }

    function closeModal() { document.getElementById('modal').style.display = "none"; }

    function deletePhoto(key) {
        if(confirm("Kyu Sofia, ye pic delete karni hai?")) {
            db.ref('pics/'+user+'/'+key).remove().then(() => {
                closeModal();
                alert("Deleted! 🗑️");
            });
        }
    }
</script>
</body>
</html>
