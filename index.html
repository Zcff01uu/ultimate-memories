<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Memories 💖</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --accent: #d63384; --light-pink: #fce4ec; --border: #efefef; }
        body { font-family: 'Segoe UI', sans-serif; background: #fff5f8; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; min-height: 100vh; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        /* --- PROFESSIONAL LOGIN PAGE --- */
        .auth-container { padding: 40px 25px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 90vh; }
        .auth-logo { font-family: 'Brush Script MT', cursive; font-size: 42px; color: var(--accent); margin-bottom: 30px; }
        .auth-input { width: 90%; padding: 14px; margin-bottom: 15px; border: 1px solid #ffc1e3; border-radius: 12px; background: #fff9fb; outline: none; transition: 0.3s; }
        .auth-input:focus { border-color: var(--accent); box-shadow: 0 0 8px rgba(214, 51, 132, 0.2); }
        .btn-main { width: 90%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-main:hover { background: #c21d6d; transform: translateY(-2px); }

        /* --- HEADER & NOTIFICATIONS --- */
        header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: white; position: sticky; top: 0; z-index: 1000; }
        .heart-icon { font-size: 24px; cursor: pointer; position: relative; }
        .notif-dot { position: absolute; top: -2px; right: -2px; background: #ff0000; width: 10px; height: 10px; border-radius: 50%; border: 2px solid white; display: none; }
        
        #notif-panel { position: absolute; top: 60px; right: 10px; width: 300px; background: white; border: 1px solid var(--border); border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none; z-index: 2000; }
        .notif-item { padding: 12px; border-bottom: 1px solid #fafafa; display: flex; align-items: center; justify-content: space-between; font-size: 13px; }

        /* --- APP UI --- */
        .view { display: none; padding: 15px; }
        .active-view { display: block; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; text-align: center; }
        .stat-box { background: var(--light-pink); padding: 10px; border-radius: 12px; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: white; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 0; }
        .nav-item { font-size: 24px; cursor: pointer; opacity: 0.5; }
        .nav-item.active { opacity: 1; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-auth" class="auth-container animate__animated animate__fadeIn">
        <div class="auth-logo">Ultimate Memories 💖</div>
        <input type="text" id="auth-u" class="auth-input" placeholder="Username">
        <input type="password" id="auth-p" class="auth-input" placeholder="Password">
        <button class="btn-main" onclick="handleAuth()">Login / Register</button>
        <p style="font-size: 12px; color: #888; margin-top: 20px;">Shared space for you and your partner</p>
    </div>

    <div id="screen-app" class="hidden">
        <header>
            <div class="auth-logo" style="font-size:26px; margin:0;">Memories</div>
            <div class="heart-icon" onclick="toggleNotifs()">
                ❤️ <div id="dot" class="notif-dot"></div>
            </div>
            <div id="notif-panel" class="animate__animated animate__fadeInDown">
                <div style="padding:12px; font-weight:bold; border-bottom:1px solid #eee;">Friend Requests</div>
                <div id="notif-list"></div>
            </div>
        </header>

        <div id="v-home" class="view active-view">
            <div id="chat-msgs" style="display:flex; flex-direction:column; gap:10px; padding-bottom: 80px;"></div>
            <div id="chat-bar" class="hidden" style="position:fixed; bottom:70px; width:100%; max-width:420px; display:flex; gap:10px; padding:10px; background:white;">
                <input type="text" id="msg-input" placeholder="Type a message..." style="flex:1; padding:12px; border-radius:25px; border:1px solid #ffc1e3;">
                <button onclick="sendMsg()" class="btn-main" style="width:70px; padding:10px;">Send</button>
            </div>
        </div>

        <div id="v-search" class="view">
            <div style="display:flex; gap:10px;">
                <input type="text" id="search-input" placeholder="Search username..." class="auth-input" style="margin:0;">
                <button onclick="searchUser()" class="btn-main" style="width:100px;">Search</button>
            </div>
            <div id="search-result" style="margin-top:20px;"></div>
        </div>

        <div id="v-profile" class="view">
            <div style="text-align:center;">
                <div style="width:90px; height:90px; background:var(--light-pink); border-radius:50%; margin: 0 auto; display:flex; align-items:center; justify-content:center; font-size:40px;">👤</div>
                <h2 id="display-name" style="color:var(--accent);">Username</h2>
                <div class="stats-grid">
                    <div class="stat-box"><b id="count-pics">0</b><br><small>Memories</small></div>
                    <div class="stat-box"><b id="status-conn">No</b><br><small>Connected</small></div>
                </div>
                <input type="file" id="file-up" style="font-size:12px;">
                <button onclick="uploadPic()" class="btn-main" style="margin-top:10px;">Upload to Gallery 📸</button>
            </div>
            <div id="gallery" style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:2px; margin-top:20px;"></div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="changeTab('home', this)">🏠</div>
            <div class="nav-item" onclick="changeTab('search', this)">🔍</div>
            <div class="nav-item" onclick="changeTab('profile', this)">👤</div>
        </nav>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyA7fMm1LjMOz4BefGk60cmMuSoFzBvJapg",
        databaseURL: "https://ultimatememories-64a97-default-rtdb.firebaseio.com",
        projectId: "ultimatememories-64a97",
        authDomain: "ultimatememories-64a97.firebaseapp.com"
    };
    firebase.initializeApp(config);
    const auth = firebase.auth(), db = firebase.database();

    let myU = "", myId = "", pId = "";

    async function handleAuth() {
        myU = document.getElementById('auth-u').value.toLowerCase().trim();
        let p = document.getElementById('auth-p').value;
        if(!myU || p.length < 6) return alert("Please enter valid details!");

        try {
            let res = await auth.signInWithEmailAndPassword(myU + "@mem.com", p);
            startApp(res.user.uid);
        } catch(e) {
            auth.createUserWithEmailAndPassword(myU + "@mem.com", p).then(res => {
                db.ref('users/' + myU).set(res.user.uid);
                startApp(res.user.uid);
            }).catch(err => alert(err.message));
        }
    }

    function startApp(uid) {
        myId = uid;
        document.getElementById('display-name').innerText = myU;
        document.getElementById('screen-auth').classList.add('hidden');
        document.getElementById('screen-app').classList.remove('hidden');
        
        // Notification Listener
        db.ref('requests/' + myId).on('value', s => {
            let list = document.getElementById('notif-list');
            let dot = document.getElementById('dot');
            list.innerHTML = "";
            let count = 0;
            s.forEach(req => {
                count++;
                list.innerHTML += `<div class="notif-item">
                    <span><b>${req.key}</b></span>
                    <div>
                        <button onclick="acceptReq('${req.key}','${req.val()}')" style="border:none; background:var(--accent); color:white; border-radius:5px; padding:5px 8px; cursor:pointer;">Accept</button>
                        <button onclick="declineReq('${req.key}')" style="border:none; background:#eee; border-radius:5px; padding:5px 8px; cursor:pointer;">✕</button>
                    </div>
                </div>`;
            });
            dot.style.display = count > 0 ? "block" : "none";
            if(count === 0) list.innerHTML = "<p style='padding:10px; color:grey; font-size:12px;'>No new requests</p>";
        });

        // Partner Listener
        db.ref('partners/' + myId).on('value', s => {
            if(s.exists()){
                pId = s.val().sId;
                document.getElementById('status-conn').innerText = "Yes";
                document.getElementById('chat-bar').classList.remove('hidden');
                loadChatAndPics();
            } else {
                document.getElementById('chat-msgs').innerHTML = "<p style='text-align:center; margin-top:100px; color:grey;'>No partner yet. Use Search 🔍</p>";
            }
        });
    }

    function searchUser() {
        let t = document.getElementById('search-input').value.toLowerCase().trim();
        if(t === myU) return alert("You can't search yourself!");
        db.ref('users/' + t).once('value', s => {
            if(s.exists()){
                document.getElementById('search-result').innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:15px; background:var(--light-pink); border-radius:12px;">
                    <b>${t}</b>
                    <button onclick="sendReq('${t}','${s.val()}')" class="btn-main" style="width:120px; padding:8px;">Send Request</button>
                </div>`;
            } else alert("User not found!");
        });
    }

    function sendReq(name, tid) {
        db.ref('requests/' + tid + '/' + myU).set(myId).then(() => {
            alert("Request sent to " + name);
        });
    }

    function acceptReq(name, tid) {
        let room = myId < tid ? myId + tid : tid + myId;
        db.ref('partners/' + myId).set({ name: name, sId: room });
        db.ref('partners/' + tid).set({ name: myU, sId: room });
        db.ref('requests/' + myId + '/' + name).remove();
        toggleNotifs();
    }

    function declineReq(name) {
        db.ref('requests/' + myId + '/' + name).remove();
    }

    function loadChatAndPics() {
        db.ref('chats/' + pId).on('value', s => {
            let box = document.getElementById('chat-msgs'); box.innerHTML = "";
            s.forEach(m => {
                let d = m.val();
                let side = d.u === myU ? "align-self:flex-end; background:var(--accent); color:white; border-radius:15px 15px 0 15px;" : "align-self:flex-start; background:#f0f0f0; border-radius:15px 15px 15px 0;";
                box.innerHTML += `<div style="${side} padding:10px 15px; max-width:70%; font-size:14px;">${d.t}</div>`;
            });
        });
        db.ref('pics/' + pId).on('value', s => {
            let g = document.getElementById('gallery'); g.innerHTML = "";
            let c = 0;
            s.forEach(p => { c++; g.innerHTML += `<img src="${p.val()}" style="width:100%; aspect-ratio:1/1; object-fit:cover;">`; });
            document.getElementById('count-pics').innerText = c;
        });
    }

    function sendMsg() {
        let t = document.getElementById('msg-input').value;
        if(t) db.ref('chats/' + pId).push({ u: myU, t: t });
        document.getElementById('msg-input').value = "";
    }

    async function uploadPic() {
        let f = document.getElementById('file-up').files[0];
        if(!f || !pId) return alert("Add a partner & select a file first!");
        let fd = new FormData(); fd.append("image", f);
        let res = await fetch("https://api.imgbb.com/1/upload?key=cb53c38c41a5ce7d642d1152d306da9a", {method:"POST", body:fd});
        let d = await res.json();
        db.ref('pics/' + pId).push(d.data.url);
    }

    function toggleNotifs() {
        let p = document.getElementById('notif-panel');
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
    }

    function changeTab(t, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('v-' + t).classList.add('active-view');
        el.classList.add('active');
        document.getElementById('notif-panel').style.display = 'none';
    }
</script>
</body>
</html>
