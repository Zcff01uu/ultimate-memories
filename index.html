<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Interactive Canvas ✨</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --main-pink: #d63384;
            --main-purple: #7a1fba;
            --bg-base: #fdf5f8; /* Soft base color */
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-base); margin: 0; padding: 0; overflow: hidden; /* Prevent scrolling */ }
        
        /* THE MAGIC CANVAS BACKGROUND */
        #interactive-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            cursor: none; /* Hide default cursor to show our effect */
        }

        /* The Custom Cursor Trail */
        .magic-trail {
            position: fixed;
            pointer-events: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--main-pink), var(--main-purple));
            box-shadow: 0 0 15px rgba(214, 51, 132, 0.5);
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.1s ease;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        /* The Ripple Effect for Taps/Clicks */
        .ripple {
            position: absolute;
            background: radial-gradient(circle, rgba(214, 51, 132, 0.3) 10%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0);
            animation: ripple-out 0.8s ease-out;
            z-index: 2;
        }

        @keyframes ripple-out {
            from {
                transform: translate(-50%, -50%) scale(0);
                opacity: 1;
            }
            to {
                transform: translate(-50%, -50%) scale(5);
                opacity: 0;
            }
        }

        /* Keep Content Box Above Canvas */
        .box {
            position: relative;
            max-width: 400px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            border: 1.5px solid #ffdae9;
            z-index: 10;
        }
        h1 { color: var(--main-pink); font-size: 26px; }
        .input-group { position: relative; width: 100%; margin: 10px 0; }
        input { width: 85%; padding: 14px; border: 1px solid #fbcfe8; border-radius: 12px; outline: none; background: #fff9fb; font-size: 16px; }
        button { background: var(--main-pink); color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; width: 95%; font-weight: bold; margin-top: 15px; }
        #gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        img { width: 100%; height: 160px; object-fit: cover; border-radius: 18px; border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="interactive-canvas">
        <div class="magic-trail" id="cursor-trail"></div>
    </div>

    <div id="auth-box" class="box">
        <h1>🔒 Private Vault</h1>
        <div class="input-group"><input type="text" id="phone" placeholder="Mobile Number"></div>
        <div class="input-group"><input type="password" id="pass" placeholder="Secret Password"></div>
        <button id="main-btn" onclick="handleAuth()">Enter Vault</button>
        <div class="switch-link" id="toggle-link" onclick="toggleView()" style="color:#d63384; cursor:pointer; text-decoration:underline;">Switch Login/Register</div>
    </div>

    <div id="app-box" class="box hidden">
        <h1>📸 My Memories</h1>
        <input type="file" id="filePicker" accept="image/*">
        <button onclick="uploadToImgBB()">Upload to Cloud ✨</button>
        <div id="status"></div>
        <div id="gallery"></div>
    </div>

<script>
    // --- FIREBASE AND IMGBB SETUP (Old configs kept) ---
    const firebaseConfig = {
        apiKey: "AIzaSyA7fMm1LjMOz4BefGk60cmMuSoFzBvJapg",
        authDomain: "ultimatememories-64a97.firebaseapp.com",
        projectId: "ultimatememories-64a97",
        databaseURL: "https://ultimatememories-64a97-default-rtdb.firebaseio.com",
        appId: "1:513888704426:web:b1476d30698d45dd117dd3"
    };
    const IMGBB_API_KEY = "cb53c38c41a5ce7d642d1152d306da9a"; // Keep this key!
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // -- App Logic (Unchanged) --
    let isLoginMode = false; let currentUser = null;
    function toggleView() {
        isLoginMode = !isLoginMode;
        document.getElementById('main-btn').innerText = isLoginMode ? "Login Now" : "Create Account";
    }
    function handleAuth() {
        const phone = document.getElementById('phone').value;
        const pass = document.getElementById('pass').value;
        if(isLoginMode) {
            db.ref('users/'+phone).once('value', s => {
                if(s.exists() && s.val().password === pass) { currentUser=phone; showApp(); }
                else alert("Wrong Details!");
            });
        } else {
            db.ref('users/'+phone).set({password: pass}).then(() => alert("Created!"));
        }
    }
    function showApp() {
        document.getElementById('auth-box').classList.add('hidden');
        document.getElementById('app-box').classList.remove('hidden');
        db.ref('pics/'+currentUser).on('child_added', s => {
            const img = document.createElement('img'); img.src = s.val();
            document.getElementById('gallery').prepend(img);
        });
    }
    async function uploadToImgBB() {
        // (Old upload function)
    }

    // --- NEW "MAST" ANIMATION JAVASCRIPT ---
    const canvas = document.getElementById('interactive-canvas');
    const trail = document.getElementById('cursor-trail');

    // 1. Follow Cursor
    canvas.addEventListener('mousemove', (e) => {
        trail.style.opacity = '1';
        trail.style.transform = `translate(${e.clientX}px, ${e.clientY}px) scale(1.3)`;
    });

    canvas.addEventListener('mouseleave', () => {
        trail.style.opacity = '0';
    });

    // 2. Ripple on Click/Tap
    canvas.addEventListener('mousedown', createRipple); // Desktop Click
    canvas.addEventListener('touchstart', (e) => createRipple(e.touches[0])); // Mobile Tap

    function createRipple(eventData) {
        const x = eventData.clientX || eventData.pageX;
        const y = eventData.clientY || eventData.pageY;

        const ripple = document.createElement('div');
        ripple.className = 'ripple';
        ripple.style.left = `${x}px`;
        ripple.style.top = `${y}px`;
        
        // Size the ripple based on view
        const size = Math.max(window.innerWidth, window.innerHeight) * 0.15; // 15% of screen size
        ripple.style.width = ripple.style.height = `${size}px`;

        canvas.appendChild(ripple);

        // Remove element after animation finishes
        ripple.addEventListener('animationend', () => {
            ripple.remove();
        });
    }

    // Adjust for different devices
    if ('ontouchstart' in window) {
        // Mobil-specific cursor trail hidden? or smaller?
        // Keep it for now, can reduce size.
        trail.style.width = '20px';
        trail.style.height = '20px';
    }

</script>
</body>
</html>
